/* undo (ctrl+Z): path commits, machine placements, removals */
const undoStack = [];
function pushUndo(u){ undoStack.push(u); if(undoStack.length > 60) undoStack.shift(); }
function doUndo(){
  const u = undoStack.pop();
  if(!u){ toast('NOTHING TO UNDO'); return; }
  if(u.kind==='path'){
    for(let k=u.tiles.length-1;k>=0;k--){
      const t = u.tiles[k];
      if(t.elev) removeElev(t.i, t.j); else removeAt(t.i, t.j);
    }
    if(u.rotated){
      const c = cells.get(keyOf(u.rotated.i, u.rotated.j));
      if(c && c.type==='belt' && !c.ramp){
        c.dir = u.rotated.prev;
        c.pc.group.rotation.y = DIR_RY[c.dir];
        refreshConnections(c.i, c.j);
      }
    }
  } else if(u.kind==='place'){
    removeAt(u.i, u.j);
  } else if(u.kind==='remove'){
    const d = u.data;
    if(d.elev) placeElevated(d.i, d.j, d.dir);
    else if(d.ramp) placeRamp(d.i, d.j, d.dir, d.ramp);
    else if(d.type==='belt') placeBelt(d.i, d.j, d.dir, d.style);
    else if(d.type==='arm') placeArm(d.i, d.j, d.dir, d.tier);
    else if(d.type==='smelter') placeSmelter(d.i, d.j, d.dir, d.tier);
    else if(d.type==='storage') placeStorage(d.i, d.j, d.dir, d.tier);
    else if(d.type==='sorter') placeSorter(d.i, d.j, d.dir);
    else if(d.type==='assembler') placeAssembler(d.i, d.j, d.dir);
    else if(d.type==='splitter'||d.type==='merger') placeHub(d.i, d.j, d.dir, d.type);
  }
  toast('UNDONE');
}
function mkArrowMesh(){
  const arrowShape = new THREE.Shape();
  arrowShape.moveTo(-0.35,-0.28); arrowShape.lineTo(0.35,0); arrowShape.lineTo(-0.35,0.28); arrowShape.lineTo(-0.15,0); arrowShape.lineTo(-0.35,-0.28);
  return new THREE.Mesh(new THREE.ShapeGeometry(arrowShape), std({color:0xb06a20, emissive:0xb06a20, emissiveIntensity:0.5, transparent:true, opacity:0.85, depthWrite:false, side:THREE.DoubleSide}));
}
function initialDirOrder(a, b, flip){
  const di = b[0]-a[0], dj = b[1]-a[1];
  const dirI = di>0?0:2, dirJ = dj>0?1:3;
  let primary = anchorAxis ? (anchorAxis==='i' ? dirI : dirJ)
                           : (Math.abs(di)>=Math.abs(dj) ? dirI : dirJ);
  let secondary = primary===dirI ? dirJ : dirI;
  if(flip){ const t=primary; primary=secondary; secondary=t; }
  return [primary, secondary, ...[0,1,2,3].filter(d=>d!==primary&&d!==secondary)];
}
/* shortest-route pathfinder: Dijkstra over (tile, heading, justLanded).
   Free tiles cost 1, turns cost a hair extra (prefers clean L-routes),
   ground-belt runs are crossed via bridge macros (straight entry, straight exit),
   machines and props are routed AROUND. */
function beltPath(a, b, flip){
  if(a[0]===b[0] && a[1]===b[1]) return [{i:a[0], j:a[1], dir:ghostDir}];
  const W=21, off=10;
  const NS = W*W*4*2;
  const idx = (i,j,h,jl)=> ((((j+off)*W + (i+off))*4 + h)<<1) | jl;
  const dist = new Float64Array(NS).fill(Infinity);
  const par = new Int32Array(NS).fill(-9);
  const pspan = new Int8Array(NS).fill(0);
  const freeAt = (i,j)=> inBounds(i,j) && !cells.has(keyOf(i,j)) && !cells2.has(keyOf(i,j));
  const goalCell = cells.get(keyOf(b[0],b[1]));
  const goalOpen = freeAt(b[0],b[1]);
  const goalEnter = !goalOpen && goalCell && goalCell.type!=='prop' && !cells2.has(keyOf(b[0],b[1]));
  const enterOK = d => {
    if(!goalCell) return true;
    if(goalCell.type==='belt') return goalCell.dir !== (d+2)%4;      // no head-on merges
    if(goalCell.type==='smelter') return goalCell.dir === d;
    if(goalCell.type==='storage') return storageAccepts(goalCell, d) || (goalCell.part===0 && goalCell.core.dir===d);
    if(goalCell.type==='arm') return goalCell.dir === d;
    if(goalCell.type==='sorter') return sorterAccepts(goalCell, d);
    if(goalCell.type==='assembler') return assemblerAccepts(goalCell, d);
    if(goalCell.type==='splitter' || goalCell.type==='merger') return hubAccepts(goalCell, d);
    return false;
  };
  function tryBridge(pi,pj,d){
    const dd=DIRS[d];
    let span=0;
    while(span<3){
      const xi=pi+dd[0]*(span+1), xj=pj+dd[1]*(span+1);
      if(!inBounds(xi,xj)) break;
      const g=cells.get(keyOf(xi,xj));
      if(g && g.type==='belt' && !g.ramp && !cells2.has(keyOf(xi,xj))) span++;
      else break;
    }
    if(span<1) return null;
    const li=pi+dd[0]*(span+1), lj=pj+dd[1]*(span+1);
    if(!freeAt(li,lj)) return null;
    return {span, li, lj};
  }
  const pq=[];
  function push(c,s,p,sp){ if(c < dist[s]-1e-12){ dist[s]=c; par[s]=p; pspan[s]=sp; pq.push({c,s}); } }
  initialDirOrder(a,b,flip).forEach((d,oi)=>{
    const dd=DIRS[d], ti=a[0]+dd[0], tj=a[1]+dd[1];
    const bias = oi*1e-6;
    if(freeAt(ti,tj) || (ti===b[0]&&tj===b[1]&&goalEnter&&enterOK(d))) push(1+bias, idx(ti,tj,d,0), -1-d, 0);
    if(freeAt(a[0],a[1])){
      const m=tryBridge(a[0],a[1],d);
      if(m) push(m.span+2+bias, idx(m.li,m.lj,d,1), -1-d, m.span);
    }
  });
  let goalState=-1;
  while(pq.length){
    let bi=0;
    for(let x=1;x<pq.length;x++) if(pq[x].c<pq[bi].c) bi=x;
    const {c,s}=pq.splice(bi,1)[0];
    if(c>dist[s]+1e-12) continue;
    const jl=s&1, h=(s>>1)&3, cellI=(s>>3)%W-off, cellJ=((s>>3)/W|0)-off;
    if(cellI===b[0] && cellJ===b[1]){ goalState=s; break; }
    for(let d=0;d<4;d++){
      if(jl && d!==h) continue;
      if((d+2)%4===h) continue;
      const dd=DIRS[d], ti=cellI+dd[0], tj=cellJ+dd[1];
      const turn = d===h ? 0 : 0.02;
      if(freeAt(ti,tj) || (ti===b[0]&&tj===b[1]&&goalEnter&&enterOK(d))) push(c+1+turn, idx(ti,tj,d,0), s, 0);
      if(!jl && d===h){
        const m=tryBridge(cellI,cellJ,d);
        if(m) push(c+m.span+2, idx(m.li,m.lj,d,1), s, m.span);
      }
    }
  }
  if(goalState<0) return [{i:a[0], j:a[1], dir:ghostDir}]; // unreachable: anchor only
  // reconstruct
  const chain=[];
  let s=goalState;
  while(s>=0){
    chain.push({i:(s>>3)%W-off, j:((s>>3)/W|0)-off, h:(s>>1)&3, span:pspan[s]});
    s=par[s];
  }
  chain.reverse();
  const recs=[{i:a[0], j:a[1], dir:chain[0].h}];
  for(const st of chain){
    if(st.span>0){
      recs[recs.length-1].ramp='up';
      const dd=DIRS[st.h], p=recs[recs.length-1];
      for(let s2=1;s2<=st.span;s2++) recs.push({i:p.i+dd[0]*s2, j:p.j+dd[1]*s2, dir:st.h, elev:true});
      recs.push({i:st.i, j:st.j, dir:st.h, ramp:'down'});
    } else {
      recs.push({i:st.i, j:st.j, dir:st.h});
    }
  }
  for(let k=0;k<recs.length-1;k++){
    if(recs[k].ramp || recs[k].elev) continue;
    const di=recs[k+1].i-recs[k].i, dj=recs[k+1].j-recs[k].j;
    const nd=DIRS.findIndex(dd=>dd[0]===di && dd[1]===dj);
    if(nd>=0) recs[k].dir=nd;
  }
  if(goalEnter && recs.length>1 && recs[recs.length-1].i===b[0] && recs[recs.length-1].j===b[1]){
    recs.pop();
  } else {
    // open endpoint: turn the last piece to CONNECT into an adjacent acceptor when possible.
    // R cycles through connect options and plain straight.
    const lastR = recs[recs.length-1];
    if(!lastR.ramp && !lastR.elev && !cells.has(keyOf(lastR.i,lastR.j))){
      const h = lastR.dir;
      const opts = [];
      for(const d of [h, (h+1)%4, (h+3)%4]){
        if(connectsFrom(lastR.i, lastR.j, d)) opts.push(d);
      }
      if(!opts.includes(h)) opts.push(h); // plain straight is always the fallback option
      lastR.dir = opts[endCycle % opts.length];
    }
  }
  return recs;
}
function connectsFrom(i,j,d){
  const dd = DIRS[d];
  const n = cells.get(keyOf(i+dd[0], j+dd[1]));
  if(!n) return false;
  if(n.type==='belt') return !n.ramp && n.dir !== (d+2)%4; // feed its back or side, never head-on
  if(n.type==='smelter') return n.dir===d;                  // into the mouth
  if(n.type==='storage') return n.part===0 && n.core.dir===d; // intake end only
  if(n.type==='arm') return n.dir===d;                       // queue at its input
  if(n.type==='sorter') return sorterAccepts({core:n.core, part:n.part}, d); // into an intake end
  if(n.type==='splitter' || n.type==='merger') return hubAccepts(n, d);
  return false;
}

function buildPathPreview(recs){
  clearPathPreview();
  lastRecs = recs;
  pathGroup = new THREE.Group();
  const hyp = new Map();
  recs.forEach((r, k)=>{
    const key = keyOf(r.i, r.j);
    const ex = cells.get(key);
    if(!ex && !r.elev) hyp.set(key, {type:'belt', dir:r.dir, ramp:r.ramp});
    else if(k===0 && recs.length>1 && ex.type==='belt' && ex.dir!==r.dir)
      hyp.set(key, {type:'belt', dir:r.dir}); // continuation anchor rotating into the turn
  });
  const get = k => hyp.get(k) || cells.get(k);
  for(const r of recs){
    const key = keyOf(r.i, r.j);
    if(cells.has(key) && !hyp.has(key) && !r.elev) continue; // untouched existing pieces
    _s = 777;
    let pc;
    if(r.elev) pc = pc_over();
    else if(r.ramp) pc = pc_ramp(r.ramp==='up');
    else {
      const shape = wouldBeShapeG(r.i, r.j, r.dir, get);
      pc = shape==='straight'
        ? BELT_STYLES[activeStyle].build(0)
        : pc_corner(activeStyle, shape==='cornerP' ? 1 : -1);
    }
    pc.group.traverse(o=>{
      if(o.isMesh){ o.material = M.ghostOK; o.castShadow=false; o.receiveShadow=false; }
      if(o.isPointLight) o.intensity = 0;
    });
    const arrow = mkArrowMesh();
    arrow.rotation.x = -Math.PI/2;
    arrow.position.y = (r.elev || r.ramp) ? 2.14 : pc.topY + 0.12;
    pc.group.add(arrow);
    pc.group.position.copy(tileCenter(r.i, r.j));
    pc.group.rotation.y = DIR_RY[r.dir];
    pathGroup.add(pc.group);
  }
  scene.add(pathGroup);
}
function commitPath(recs){
  const placedTiles = [];
  let rotated = null;
  // continuing from an existing belt with an immediate turn: that belt becomes the corner
  if(recs.length > 1){
    const first = cells.get(keyOf(recs[0].i, recs[0].j));
    if(first && first.type==='belt' && !first.ramp && first.dir !== recs[0].dir){
      rotated = {i:first.i, j:first.j, prev:first.dir};
      first.dir = recs[0].dir;
      first.pc.group.rotation.y = DIR_RY[first.dir];
      refreshConnections(first.i, first.j);
    }
  }
  for(const r of recs){
    let ok = false;
    if(r.elev) ok = placeElevated(r.i, r.j, r.dir);
    else if(r.ramp) ok = placeRamp(r.i, r.j, r.dir, r.ramp);
    else ok = placeBelt(r.i, r.j, r.dir, activeStyle);
    if(ok) placedTiles.push({i:r.i, j:r.j, elev:!!r.elev});
  }
  if(placedTiles.length || rotated) pushUndo({kind:'path', tiles:placedTiles, rotated});
  if(placedTiles.length){ sfx.belt(); const lt=placedTiles[placedTiles.length-1]; const cc=tileCenter(lt.i,lt.j); puffAt(cc.x, cc.z); }
  else if(!rotated) sfx.err();
  if(recs.length){
    placePulse(recs[0].i, recs[0].j);
    if(recs.length > 1) placePulse(recs[recs.length-1].i, recs[recs.length-1].j);
  }
  return placedTiles.length;
}

function rebuildGhost(){

    const pc = ghostShape==='straight'
      ? BELT_STYLES[activeStyle].build(0)
      : pc_corner(activeStyle, ghostShape==='cornerP' ? 1 : -1);

  } else if(activeTool==='arm'){
    const tr = machineTier.arm;
    const rig = mkArmRig(0.72, TIER_PAINT()[tr], tr===0?M.emberGlow:TIER_PAINT()[tr]);
    const ctl = mkArmCtl(rig, new THREE.Vector3());

  } else if(activeTool==='splitter' || activeTool==='merger'){
    g = buildHub(activeTool==='splitter').group; topA = 1.6;
  } else if(activeTool==='sorter'){
    const b = buildSorter();
    for(let s=0;s<6;s++){
      _s = 33+s;

  arrow.rotation.x = -Math.PI/2;
  arrow.position.y = topA;
  ghost = new THREE.Group();
  ghost.add(g); ghost.add(arrow);
  ghost.visible = false;
  scene.add(ghost);
}

const TOOL_LABEL = {arm:'06 · TRANSFER ARM', smelter:'07 · ORE SMELTER', storage:'08 · STORAGE', sorter:'09 · SORTER', assembler:'00 · ASSEMBLER', splitter:'SPLITTER — 1 IN · 3 OUT', merger:'MERGER — 3 IN · 1 OUT'};

function refreshToolLabel(){
  const el = document.getElementById('styleName');
  el.textContent = activeTool==='belt'
    ? '0'+(activeStyle+1)+' · '+BELT_STYLES[activeStyle].name
    : TOOL_LABEL[activeTool] + (TIERED.has(activeTool) ? ' ' + TIER_NAME[machineTier[activeTool]] : '');

function beltChain(rec){
  const seen = new Set([rec]), stack = [rec];
  while(stack.length && seen.size < 400){
    const r = stack.pop();
    const d = DIRS[r.dir];
    const f = cells.get(keyOf(r.i+d[0], r.j+d[1]));
    if(f && f.type==='belt' && !f.ramp && !seen.has(f)){ seen.add(f); stack.push(f); }
    for(let w=0; w<4; w++){
      const n = cells.get(keyOf(r.i+DIRS[w][0], r.j+DIRS[w][1]));
      if(n && n.type==='belt' && !n.ramp && !seen.has(n) &&
         DIRS[n.dir][0]===-DIRS[w][0] && DIRS[n.dir][1]===-DIRS[w][1]){ seen.add(n); stack.push(n); }
    }
  }
  return [...seen];
}
function setActiveStyle(i, applyAll){
  activeTool = 'belt';
  activeStyle = ((i%3)+3)%3;
  refreshToolLabel();
  rebuildGhost();

  if(applyAll){

      // upgrade the whole connected line
      let n = 0;
      for(const rec of beltChain(h)) if(restyleBelt(rec.i, rec.j, activeStyle)) n++;
      if(n){ placePulse(h.i, h.j); sfx.up(); toast('LINE UPGRADED — '+BELT_STYLES[activeStyle].name); }
    } else {
      for(const rec of [...cells.values()]){
        if(rec.type==='belt' && !rec.ramp) restyleBelt(rec.i, rec.j, activeStyle);
      }
    }
  } else if(h && h.type==='belt' && !h.ramp){
    if(restyleBelt(h.i, h.j, activeStyle)){ placePulse(h.i, h.j); sfx.up(); }
  }
}
function flipBelt(i,j){

  rec.dir = (rec.dir+2)%4;

}

const raycaster = new THREE.Raycaster();
const groundPlane = new THREE.Plane(new THREE.Vector3(0,1,0), 0);

function rayGround(cx, cy){

function primaryClick(cx, cy){
  const ndc = new THREE.Vector2(cx/innerWidth*2-1, -(cy/innerHeight*2-1));
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(containers.map(c=>c.g), true);
  if(hits.length){
    let o = hits[0].object;
    while(o && o.userData.containerIndex===undefined) o = o.parent;
    if(o){ queueFeed(o.userData.containerIndex); return; }
  }
  // sorter port filter cycling
  const sorterGroups = [];
  for(const c of cells.values()) if(c.type==='sorter' && c.part===0) sorterGroups.push(c.core.group);
  if(sorterGroups.length){
    const sh = raycaster.intersectObjects(sorterGroups, true);
    if(sh.length){
      let o = sh[0].object;
      while(o && o.userData.sorterSlot===undefined) o = o.parent;
      if(o && o.userData.sorterCore){
        const core = o.userData.sorterCore, slot = o.userData.sorterSlot;
        let k = core.slots[slot];
        k = k >= ITEM_KINDS.length-1 ? -1 : k+1;
        sorterSetSlot(core, slot, k);
        toast('SLOT → ' + (k<0 ? 'CLOSED' : ITEM_KINDS[k].name));
        return;
      }
    }
  }
  if(!buildMode) return;
  const p = rayGround(cx, cy);
  if(!p) return;
  const [i,j] = tileAt(p.x, p.z);
  primaryAt(i,j);
}
function primaryAt(i,j){
  if(!inBounds(i,j)) return;
  if(activeTool==='belt'){
    if(!anchor){
      const cell = cells.get(keyOf(i,j));
      if(!cell){ anchor = [i,j]; anchorAxis = null; }
      else if(cell.type==='belt'){ // continue from an existing belt: extend along its axis first
        anchor = [i,j];
        ghostDir = cell.dir;
        anchorAxis = DIRS[cell.dir][0]!==0 ? 'i' : 'j';
      }
    } else {
      const recs = beltPath(anchor, [i,j], bendFlip);
      commitPath(recs);
      const last = recs[recs.length-1];
      const dd = DIRS[last.dir];
      const ahead = cells.get(keyOf(last.i+dd[0], last.j+dd[1]));
      if(ahead && ahead.type!=='prop'){
        cancelAnchor();                        // run connected into the network: done
      } else {
        anchor = [last.i, last.j];             // open end: chain onward
        ghostDir = last.dir;
        anchorAxis = DIRS[last.dir][0]!==0 ? 'i' : 'j';
        endCycle = 0;
        clearPathPreview();
      }
    }
  } else if(!cells.has(keyOf(i,j))){
    let ok = false;
    if(activeTool==='arm') ok = placeArm(i,j,ghostDir,machineTier.arm);
    else if(activeTool==='smelter') ok = placeSmelter(i,j,ghostDir,machineTier.smelter);
    else if(activeTool==='sorter') ok = placeSorter(i,j,ghostDir);
    else if(activeTool==='assembler') ok = placeAssembler(i,j,ghostDir);
    else if(activeTool==='splitter' || activeTool==='merger') ok = placeHub(i,j,ghostDir,activeTool);
    else ok = placeStorage(i,j,ghostDir);
    if(ok){ pushUndo({kind:'place', i, j}); placePulse(i,j); const cc=tileCenter(i,j); puffAt(cc.x, cc.z, 0.3); sfx.machine(); }
    else sfx.err();
  }
}

  pulses.push({m:ring, t:0});
}
function placePulse(i,j){ const c=tileCenter(i,j); pulseAt(c.x, c.z, 1.2); }

let autoFeed = true, autoT = 1.4, autoI = 0;

const moveKeys = new Set();
addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  if((e.ctrlKey || e.metaKey) && k==='z'){ e.preventDefault(); doUndo(); return; }
  if(!e.ctrlKey && !e.metaKey && 'wasd'.includes(k) && k.length===1) moveKeys.add(k);
  if(k==='escape'){ cancelAnchor(); }
  else if(k==='r'){
    if(anchor && ghostTile){
      if(ghostTile[0]===anchor[0] && ghostTile[1]===anchor[1]) ghostDir = (ghostDir+1)%4;
      else if(ghostTile[0]===anchor[0] || ghostTile[1]===anchor[1]) endCycle++;
      else bendFlip = !bendFlip;
    } else if(buildMode && ghostTile && !cells.has(keyOf(ghostTile[0],ghostTile[1]))){
      ghostDir = (ghostDir+1)%4;
      snapLock = true;
    } else {
      const h = hoverCell();
      if(h && h.type!=='prop') rotateAt(h.i, h.j);
      else if(buildMode) ghostDir = (ghostDir+1)%4;
    }
  }
  else if(k>='1' && k<='3') setActiveStyle(+k-1, e.shiftKey);
  else if(k==='6') setTool('arm');
  else if(k==='7') setTool('smelter');
  else if(k==='8') setTool('storage');
  else if(k==='9') setTool('sorter');
  else if(k==='0') setTool('assembler');
  else if(k==='q') setTool('splitter');
  else if(k==='e') setTool('merger');
  else if(k==='b') setBuildMode(!buildMode);
  else if(k==='f'){ const h = hoverCell(); if(h && h.type==='belt') flipBelt(h.i, h.j); }
  else if(k==='g'){ autoFeed = !autoFeed; document.getElementById('auto').classList.toggle('on', autoFeed); }
});
addEventListener('keyup', e=>{ moveKeys.delete(e.key.toLowerCase()); });
addEventListener('blur', ()=>{ moveKeys.clear(); });

addEventListener('resize', ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

function updatePathHud(end){
  const ph = document.getElementById('pathHud');
  if(!ph || !lastRecs) return;
  const recs = lastRecs;
  let fresh = 0, bridges = 0;
  for(const r of recs){
    if(!cells.has(keyOf(r.i,r.j)) || r.elev) fresh++;
    if(r.ramp==='up') bridges++;
  }
  const reachedEnd = recs.length && (Math.abs(recs[recs.length-1].i-end[0]) + Math.abs(recs[recs.length-1].j-end[1])) <= 1;
  const goalCell = cells.get(keyOf(end[0], end[1]));
  const rate = (TIER_SPEED[activeStyle]*60/0.6)|0;
  let msg, bad = false;
  if(recs.length<=1 && (end[0]!==anchor[0] || end[1]!==anchor[1])){
    bad = true;
    msg = (goalCell && goalCell.type!=='belt' && goalCell.type!=='prop') ? 'INPUT MISMATCH — WRONG SIDE' : 'NO ROUTE';
  } else {
    const last = recs[recs.length-1];
    const dd = DIRS[last.dir];
    const ai = last.i+dd[0], aj = last.j+dd[1];
    const ahead = cells.get(keyOf(ai,aj));
    let connect = '';
    if(ahead && ahead.type!=='prop'){
      if(ahead.type==='belt'){
        connect = ' · → MERGE';
      } else if(connectsFrom(last.i, last.j, last.dir)){
        const pl = portsForTile(last.i, last.j).find(pp=>pp.cell===ahead || (pp.cell.core && ahead.core===pp.cell.core));
        connect = ' · → ' + (pl ? pl.p.label : ahead.type.toUpperCase());
        if(machineFull(ahead, last.dir)) connect += ' · CURRENTLY FULL';
      } else {
        bad = true;
        msg = 'INPUT MISMATCH — WRONG SIDE';
      }
    }
    if(!bad){
      msg = fresh + ' BELT' + (fresh===1?'':'S') + ' · ' + BELT_STYLES[activeStyle].name.split(' — ')[0]
          + ' · ' + rate + '/MIN'
          + (bridges ? ' · ' + bridges + ' BRIDGE' + (bridges>1?'S':'') : '')
          + (!reachedEnd ? ' · STOPS SHORT' : '')
          + connect;
    }
  }
  ph.textContent = msg;
  ph.classList.add('on');
  ph.classList.toggle('bad', bad);
}
function updatePortHover(t){
  // hover glow + guidance, in build mode with the belt tool
  if(!buildMode || activeTool!=='belt' || !t){ hidePortGlow(); if(!anchor){ const ph=document.getElementById('pathHud'); if(ph) ph.classList.remove('on','bad'); } return; }
  const plist = portsForTile(t[0], t[1]);
  const ph = document.getElementById('pathHud');
  if(!plist.length){
    hidePortGlow();
    if(!anchor && ph) ph.classList.remove('on','bad');
    return;
  }
  const c = tileCenter(t[0], t[1]);
  // pick: prefer inputs; if anchored, judge against the path's approach direction
  let approach = null;
  if(anchor && lastRecs && lastRecs.length){
    const last = lastRecs[lastRecs.length-1];
    if(last.i===t[0] && last.j===t[1]) approach = last.dir;
    else { const dd = [t[0]-last.i, t[1]-last.j]; approach = dirIndexOf(dd[0], dd[1]); }
  }
  const inputs = plist.filter(pp=>pp.p.inb);
  const pick = inputs[0] || plist[0];
  let state, msg, bad=false;
  if(pick.p.inb){
    const entryOKh = pick.p.entry===null || approach===null || approach===pick.p.entry;
    if(entryOKh){
      state = 'in';
      msg = pick.p.label + ' — CONNECT HERE';
      if(machineFull(pick.cell, pick.p.entry===null?0:pick.p.entry)) msg += ' · CURRENTLY FULL';
    } else {
      state = 'bad'; bad = true;
      msg = pick.p.label + ' — WRONG SIDE, ENTER ALONG THE ARROW';
    }
  } else {
    state = anchor ? 'bad' : 'out';
    bad = !!anchor;
    msg = pick.p.label + (anchor ? ' — OUTPUT ONLY' : ' — ITEMS EXIT HERE');
  }
  const yaw = pick.p.entry!==null ? DIR_RY[pick.p.entry] : 0;
  setPortGlow(c.x, c.z, yaw, state);
  if(ph && (!anchor || bad)){
    ph.textContent = msg;
    ph.classList.add('on');
    ph.classList.toggle('bad', bad || state==='bad');
  }
}

/* ================= UI ================= */
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('on'), 2200);
}
function updateCounter(){
  let belts=cells2.size, mach=0;
  for(const c of cells.values()){
    if(c.type==='belt') belts++;
    else if(c.type==='arm'||c.type==='smelter'||c.type==='storage'||c.type==='splitter'||c.type==='merger') mach++;
    else if(c.type==='sorter' && c.part===0) mach++;
    else if(c.type==='assembler' && c.part===0) mach++;
  }
  document.getElementById('count').textContent = belts+' BELTS · '+mach+' MACHINES · '+riders.length+' ITEMS';
}

/* ================= starter layout =================
   ore hopper -> big arm -> belt -> SMELTER -> belt -> CURVE -> belts
   -> TRANSFER ARM -> belts -> off the end */
placeBelt( 2,1,2,0); placeBelt( 1,1,2,0);
placeSmelter(0,1,2);
placeBelt(-1,1,2,0);
placeBelt(-2,1,1,0);            // fed from the side -> auto-curves
placeBelt(-2,2,1,0); placeBelt(-2,3,1,0);
placeArm(-2,4,1);
placeBelt(-2,5,1,0); placeBelt(-2,6,1,0);
placeStorage(-2,7,1);
refreshToolLabel();
rebuildGhost();
setBuildMode(true);
document.getElementById('auto').classList.toggle('on', autoFeed);
updateCounter();

/* ================= loop ================= */
const clock = new THREE.Clock();
function tick(){
  requestAnimationFrame(tick);
  const dt = Math.min(clock.getDelta(), 0.05);

  updatePieces(dt);
  updateRiders(dt);
  updateBigArm(dt);
  updateSmallArms(dt);
  updateSmelters(dt);
  updateSorters(dt);
  updateAssemblers(dt);
  updateStorages(dt);
  updateHubs(dt);
  updateFeedback(dt);
  updateMachineLabels();

  if(autoFeed && !bigArm.seq && jobQueue.length===0){
    autoT -= dt;
    if(autoT <= 0){
      const drop = findDropTile();
      if(drop && ridersOn(drop.i, drop.j) < 2){ queueFeed(autoI%5); autoI++; }
      autoT = 1.3;
    }
  }

  if(buildMode && ghost){
    const t = hoverTile();
    ghostTile = t;
    applyGhostSnap(t);
    updatePortHover(t);
    if(anchor && activeTool==='belt'){
      ghost.visible = false;
      const end = (t && inBounds(t[0],t[1])) ? t : anchor;
      const key = anchor.join(',')+'|'+end.join(',')+'|'+(bendFlip?1:0)+'|'+endCycle+'|'+activeStyle;
      if(key !== pathKey){
        pathKey = key;
        buildPathPreview(beltPath(anchor, end, bendFlip));
        updatePathHud(end);
      }
    } else {
      if(activeTool==='belt'){
        const ws = t ? wouldBeShape(t[0], t[1], ghostDir) : 'straight';
        if(ws !== ghostShape){ ghostShape = ws; rebuildGhost(); }
      }
      if(t && inBounds(t[0],t[1])){
        const occupied = cells.has(keyOf(t[0],t[1]));
        ghostValid = !occupied;
        ghost.visible = true;
        ghost.position.copy(tileCenter(t[0],t[1]));
        ghost.rotation.y = DIR_RY[ghostDir];
        setGhostTint(ghostValid);
      } else {
        ghost.visible = false;
        ghostValid = false;
      }
    }
  }

  if(portGlow.g.visible){
    const p = 1 + Math.sin(phase*7)*0.09;
    portGlow.g.scale.setScalar(p);
  }
  for(let i=pulses.length-1;i>=0;i--){
    const p = pulses[i];
    p.t += dt*1.4;
    p.m.scale.setScalar(1 + p.t*0.5);
    p.m.material.opacity = 1 - p.t;
    if(p.t>=1){ scene.remove(p.m); pulses.splice(i,1); }
  }

  if(moveKeys.size){
    const fx = -Math.sin(theta), fz = -Math.cos(theta); // camera-forward on the ground
    const rx = -fz, rz = fx;                            // screen-right
    let mx = 0, mz = 0;
    if(moveKeys.has('w')){ mx += fx; mz += fz; }
    if(moveKeys.has('s')){ mx -= fx; mz -= fz; }
    if(moveKeys.has('d')){ mx += rx; mz += rz; }
    if(moveKeys.has('a')){ mx -= rx; mz -= rz; }
    const len = Math.sqrt(mx*mx+mz*mz);
    if(len > 0){
      const sp = dist * 0.85 * dt / len;
      camTarget.x = clamp(camTarget.x + mx*sp, -26, 26);
      camTarget.z = clamp(camTarget.z + mz*sp, -26, 26);
    }
  }

  camera.position.set(
    camTarget.x + dist*Math.sin(phi)*Math.sin(theta),
    camTarget.y + dist*Math.cos(phi),
    camTarget.z + dist*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(camTarget);

  renderer.render(scene, camera);
}
tick();

/* test hooks */
window.__cw = {
  riders, cells,
  place:placeBelt, placeArm, placeSmelter, placeStorage, placeSorter, placeAssembler, placeHub, remove:removeAt, rotate:rotateAt,
  flipBelt,
  snapAt:(i,j)=>{ applyGhostSnap([i,j]); return ghostDir; },
  portHover:(i,j)=>{ updatePortHover(i===null?null:[i,j]); const ph=document.getElementById('pathHud'); return {glow:portGlow.g.visible, hud:ph.textContent, on:ph.classList.contains('on'), bad:ph.classList.contains('bad')}; },
  portsAt:(i,j)=>portsForTile(i,j).map(pp=>({label:pp.p.label, inb:pp.p.inb, entry:pp.p.entry})),
  upgradeChain:(i,j,style)=>{ const h=cells.get(keyOf(i,j)); if(!h||h.type!=='belt'||h.ramp) return 0; let n=0; for(const r of beltChain(h)) if(restyleBelt(r.i,r.j,style)) n++; return n; },
  asmInfo:(i,j)=>{ const c=cells.get(keyOf(i,j)); return (c&&c.type==='assembler') ? {inA:c.core.inA, inB:c.core.inB, buffer:c.core.buffer, t:+c.core.t.toFixed(2)} : null; },
  sorterSlot:(i,j,slot,kindIdx)=>{ const c=cells.get(keyOf(i,j)); if(c&&c.type==='sorter'){ sorterSetSlot(c.core, slot, kindIdx); return true; } return false; },
  sorterInfo:(i,j)=>{ const c=cells.get(keyOf(i,j)); return (c&&c.type==='sorter') ? {slots:[...c.core.slots], queue:c.core.queue.length, dir:c.core.dir, origin:c.core.origin} : null; },
  setStyle:(i,all)=>setActiveStyle(i,all),
  setTool, setBuild:setBuildMode,
  feed:queueFeed,
  setAuto:(v)=>{ autoFeed=v; },
  cam:(t,p,d)=>{ theta=t; phi=p; dist=d; },
  camT:(x,y,z)=>{ camTarget.set(x,y,z); },
  ghostAt:(x,y)=>{ mouseX=x; mouseY=y; },
  click:(x,y)=>primaryClick(x,y),
  clickTile:(i,j)=>primaryAt(i,j),
  cancelAnchor,
  flipBend:()=>{ bendFlip=!bendFlip; },
  pathInfo:()=>({anchor, bendFlip, hasPreview:!!pathGroup, previewCount:pathGroup?pathGroup.children.length:0}),
  ghostInfo:()=>({tile:ghostTile, shape:ghostShape, dir:ghostDir, valid:ghostValid}),
  setGhostDir:(d)=>{ ghostDir=((d%4)+4)%4; },
  proj:(x,z)=>{ const v=new THREE.Vector3(x,1,z).project(camera); return [(v.x+1)/2*innerWidth, (1-v.y)/2*innerHeight]; },
  cellAt:(i,j)=>{ const c=cells.get(keyOf(i,j)); return c?{type:c.type,dir:c.dir,shape:c.shape,queue:c.queue,buffer:c.buffer,count:c.count,ramp:c.ramp,tier:c.tier,cap:c.cap}:null; },
  elevAt:(i,j)=>{ const c=cells2.get(keyOf(i,j)); return c?{dir:c.dir}:null; },
  undo:doUndo,
  state:()=>{
    let belts=0,arms=0,smelters=0;
    for(const c of cells.values()){ if(c.type==='belt')belts++; else if(c.type==='arm')arms++; else if(c.type==='smelter')smelters++; }
    return {belts, arms, smelters, riders:riders.length, busy:!!bigArm.seq, queue:jobQueue.length, buildMode, activeTool, activeStyle,
      riderPos:riders.map(r=>[+r.mesh.position.x.toFixed(2), +r.mesh.position.y.toFixed(2), +r.mesh.position.z.toFixed(2), r.falling?1:0, r.claimed?1:0])};
  }
};
})();
</script>
