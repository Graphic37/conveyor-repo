<script>
/* CONVEYOR WORKS v3 — curved belts, transfer arms, ore smelter. Dark-muted ember/bone/stone palette. */
(function(){
'use strict';

/* ================= helpers ================= */
let _s = 1337;
function rnd(){ _s = (_s*1664525 + 1013904223) >>> 0; return _s / 4294967296; }
function rr(a,b){ return a + rnd()*(b-a); }
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }
function ease(t){ return t<0?0:t>1?1:t*t*(3-2*t); }
function mod(a,n){ return ((a%n)+n)%n; }

function makeTex(w,h,fn,rep){
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  fn(c.getContext('2d'),w,h);
  const t=new THREE.CanvasTexture(c);
  t.encoding=THREE.sRGBEncoding;
  if(rep!==false){ t.wrapS=t.wrapT=THREE.RepeatWrapping; }
  t.anisotropy=4;
  return t;
}
function std(o){ return new THREE.MeshStandardMaterial(o); }
function box(w,h,d,m){ const g=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); g.castShadow=true; g.receiveShadow=true; return g; }
function cyl(rt,rb,h,seg,m){ const g=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),m); g.castShadow=true; g.receiveShadow=true; return g; }
function speck(g,w,h,n,cols,a0,a1,s0,s1){
  for(let i=0;i<n;i++){
    g.fillStyle=cols[(rnd()*cols.length)|0];
    g.globalAlpha=rr(a0,a1);
    const s=rr(s0,s1);
    g.fillRect(rnd()*w, rnd()*h, s, s);
  }
  g.globalAlpha=1;
}

/* ================= palette / textures ================= */
const P = {
  bg:0x121010, iron:0x2c2c30, ironDark:0x232326, steel:0x565a60,
  ember:0x8a4a1e, emberHi:0xb06a20, bone:0xc9bfa8, boneDim:0xa89e88,
  stone:0x57503f, stoneDark:0x2e2b28, wood:0x4a3a26, woodDark:0x352a1c,
  brass:0x8a6a34, brassDark:0x6a5228, cloth:0x7a6a4e
};

const T = {};
T.ground = makeTex(1024,1024,(g,w,h)=>{
  g.fillStyle='#161311'; g.fillRect(0,0,w,h);
  const n=14, s=w/n;
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const v=rr(-8,8)|0;
    g.fillStyle=`rgb(${24+v},${20+v},${17+v})`;
    g.fillRect(x*s+1.5, y*s+1.5, s-3, s-3);
    if(rnd()<0.28){ g.fillStyle='rgba(0,0,0,0.18)'; g.fillRect(x*s+rr(4,s/2), y*s+rr(4,s/2), rr(6,s/2), rr(4,10)); }
  }
  speck(g,w,h,2600,['#0d0b09','#2c2620','#231d17'],0.12,0.4,1,3);
  const rg=g.createRadialGradient(w/2,h/2,w*0.18,w/2,h/2,w*0.62);
  rg.addColorStop(0,'rgba(0,0,0,0)'); rg.addColorStop(1,'rgba(0,0,0,0.82)');
  g.fillStyle=rg; g.fillRect(0,0,w,h);
},false);

/* chevrons point toward +u = direction of travel (+X local); stroke color marks the speed tier */
function mkChevronTex(stroke){
  const t = makeTex(128,128,(g,w,h)=>{
    g.fillStyle='#1b1b1d'; g.fillRect(0,0,w,h);
    g.strokeStyle=stroke; g.lineWidth=11; g.lineCap='butt';
    for(let i=-1;i<3;i++){
      const x=i*64;
      g.beginPath(); g.moveTo(x, h*0.9); g.lineTo(x+34, h*0.5); g.lineTo(x, h*0.1); g.stroke();
    }
    g.strokeStyle='#141416'; g.lineWidth=2;
    g.beginPath(); g.moveTo(0,4); g.lineTo(w,4); g.moveTo(0,h-4); g.lineTo(w,h-4); g.stroke();
    speck(g,w,h,220,['#111','#303033'],0.15,0.4,1,2);
  });
  t.repeat.set(2,1);
  return t;
}
T.chevron = mkChevronTex('#2b2b2e');
T.chevron2 = mkChevronTex('#4c7245');
T.chevron3 = mkChevronTex('#46688c');
T.chevronT = [T.chevron, T.chevron2, T.chevron3];

T.wood = makeTex(256,256,(g,w,h)=>{
  g.fillStyle='#4a3a26'; g.fillRect(0,0,w,h);
  for(let i=0;i<6;i++){
    const y=i*(h/6);
    g.fillStyle=i%2?'#453520':'#4e3d29'; g.fillRect(0,y,w,h/6-2);
    g.fillStyle='#2c2214'; g.fillRect(0,y+h/6-2,w,2);
    g.strokeStyle='rgba(30,22,12,0.5)'; g.lineWidth=1;
    for(let k=0;k<5;k++){ const yy=y+rr(4,h/6-6); g.beginPath(); g.moveTo(0,yy); g.bezierCurveTo(w*0.3,yy+rr(-3,3),w*0.7,yy+rr(-3,3),w,yy); g.stroke(); }
  }
  speck(g,w,h,300,['#241a0e','#5a4830'],0.1,0.3,1,2);
});

T.rust = makeTex(256,256,(g,w,h)=>{
  g.fillStyle='#3a2f26'; g.fillRect(0,0,w,h);
  for(let i=0;i<50;i++){
    g.fillStyle=['#5a3a24','#6e4526','#4a3222','#2e241c'][(rnd()*4)|0];
    g.globalAlpha=rr(0.25,0.6);
    g.beginPath(); g.ellipse(rnd()*w,rnd()*h,rr(6,34),rr(4,20),rnd()*3,0,7); g.fill();
  }
  g.globalAlpha=1;
  speck(g,w,h,900,['#1e1712','#7a4e2a','#2a201a'],0.2,0.5,1,3);
});
T.rust2 = makeTex(256,256,(g,w,h)=>{
  g.fillStyle='#443528'; g.fillRect(0,0,w,h);
  for(let i=0;i<40;i++){
    g.fillStyle=['#5f3f26','#33281e','#6e4a28'][(rnd()*3)|0];
    g.globalAlpha=rr(0.3,0.6);
    g.beginPath(); g.ellipse(rnd()*w,rnd()*h,rr(8,40),rr(5,24),rnd()*3,0,7); g.fill();
  }
  g.globalAlpha=1;
  speck(g,w,h,700,['#1e1712','#7a4e2a'],0.2,0.5,1,3);
});

T.hazard = makeTex(128,64,(g,w,h)=>{
  g.fillStyle='#26221d'; g.fillRect(0,0,w,h);
  g.fillStyle='#7c4a20';
  for(let i=-1;i<5;i++){
    g.beginPath(); g.moveTo(i*32,h); g.lineTo(i*32+16,0); g.lineTo(i*32+32,0); g.lineTo(i*32+16,h); g.fill();
  }
  speck(g,w,h,240,['#141210','#3a3028'],0.25,0.55,1,3);
});

function runeTex(seed){
  _s=seed;
  return makeTex(128,128,(g,w,h)=>{
    g.fillStyle='#232120'; g.fillRect(0,0,w,h);
    speck(g,w,h,300,['#1a1817','#2e2b28'],0.3,0.6,1,3);
    g.strokeStyle='#965c1e'; g.lineWidth=5; g.lineCap='round'; g.globalAlpha=0.9;
    g.beginPath();
    let x=w*0.5, y=h*0.2; g.moveTo(x,y);
    for(let i=0;i<5;i++){ x=clamp(x+rr(-34,34),18,w-18); y=clamp(y+rr(10,22),12,h-12); g.lineTo(x,y); }
    g.stroke();
    g.beginPath(); g.moveTo(w*0.3,h*0.5); g.lineTo(w*0.7,h*0.5); g.stroke();
    g.globalAlpha=1;
  });
}
T.rune1=runeTex(11); T.rune2=runeTex(77);

T.stone = makeTex(256,256,(g,w,h)=>{
  g.fillStyle='#57503f'; g.fillRect(0,0,w,h);
  for(let i=0;i<30;i++){
    g.fillStyle=['#4e4837','#5f5846','#463f31'][(rnd()*3)|0];
    g.globalAlpha=rr(0.3,0.55);
    g.beginPath(); g.ellipse(rnd()*w,rnd()*h,rr(10,44),rr(8,26),rnd()*3,0,7); g.fill();
  }
  g.globalAlpha=1;
  speck(g,w,h,700,['#2e2a20','#6a6250'],0.15,0.4,1,2);
});
T.basalt = makeTex(256,256,(g,w,h)=>{
  g.fillStyle='#2a2725'; g.fillRect(0,0,w,h);
  for(let i=0;i<26;i++){
    g.fillStyle=['#242220','#312d2a','#1f1d1b'][(rnd()*3)|0];
    g.globalAlpha=rr(0.35,0.6);
    g.beginPath(); g.ellipse(rnd()*w,rnd()*h,rr(10,40),rr(8,24),rnd()*3,0,7); g.fill();
  }
  g.globalAlpha=1;
  speck(g,w,h,600,['#151312','#3a3532'],0.15,0.4,1,2);
});
T.vents = makeTex(64,64,(g,w,h)=>{
  g.fillStyle='#232326'; g.fillRect(0,0,w,h);
  g.fillStyle='#141416';
  for(let i=0;i<6;i++) g.fillRect(8, 6+i*9, w-16, 4);
});

/* ================= materials ================= */
const M = {
  iron: std({color:P.iron, roughness:0.55, metalness:0.65}),
  ironDark: std({color:P.ironDark, roughness:0.6, metalness:0.6}),
  steel: std({color:P.steel, roughness:0.42, metalness:0.85}),
  emberPaint: std({color:P.ember, roughness:0.7, metalness:0.2}),
  emberGlow: std({color:P.ember, emissive:P.emberHi, emissiveIntensity:0.22, roughness:0.6, metalness:0.1}),
  bone: std({color:P.bone, roughness:0.85}),
  boneDim: std({color:P.boneDim, roughness:0.9}),
  bone2: std({color:0xbdb29a, roughness:0.85}),
  stone: std({map:T.stone, roughness:0.95}),
  stonePlain: std({color:P.stone, roughness:0.95}),
  stoneDark: std({color:P.stoneDark, roughness:0.95}),
  basalt: std({map:T.basalt, roughness:0.9, metalness:0.05}),
  basaltPlain: std({color:0x2a2725, roughness:0.9}),
  wood: std({map:T.wood, roughness:0.85}),
  woodDark: std({color:P.woodDark, roughness:0.9}),
  brass: std({color:P.brass, roughness:0.35, metalness:0.9}),
  brassDark: std({color:P.brassDark, roughness:0.45, metalness:0.85}),
  rust: std({map:T.rust, roughness:0.8, metalness:0.35}),
  rust2: std({map:T.rust2, roughness:0.8, metalness:0.3}),
  rust3: std({color:0x4e3826, roughness:0.85, metalness:0.3}),
  rust4: std({color:0x38302a, roughness:0.85, metalness:0.4}),
  rubber: std({map:T.chevron, roughness:0.9, metalness:0.05}),
  rubber2: std({map:T.chevron2, roughness:0.9, metalness:0.05}),
  rubber3: std({map:T.chevron3, roughness:0.9, metalness:0.05}),
  tierMark2: std({color:0x4c7245, roughness:0.6, metalness:0.2}),
  tierMark3: std({color:0x46688c, roughness:0.6, metalness:0.2}),
  hazard: std({map:T.hazard, roughness:0.75, metalness:0.15}),
  cloth: std({color:P.cloth, roughness:1.0}),
  brick: std({color:0x5c3f30, roughness:0.95}),
  dark: std({color:0x161618, roughness:0.95}),
  amber: std({color:0x9a5c1c, emissive:0xb06a20, emissiveIntensity:0.14, roughness:0.35, metalness:0.1}),
  gem: std({color:0x9a5c1c, emissive:0xb06a20, emissiveIntensity:0.2, roughness:0.25, metalness:0.1, flatShading:true}),
  ore: std({color:0x3f3a34, roughness:0.95, flatShading:true}),
  rune1: std({map:T.rune1, emissive:0x7a4212, emissiveIntensity:0.14, emissiveMap:T.rune1, roughness:0.9}),
  rune2: std({map:T.rune2, emissive:0x7a4212, emissiveIntensity:0.14, emissiveMap:T.rune2, roughness:0.9}),
  ghostOK: std({color:0xb06a20, emissive:0x8a4a1e, emissiveIntensity:0.3, transparent:true, opacity:0.42, depthWrite:false, side:THREE.DoubleSide}),
  ghostBad: std({color:0x6e2a20, emissive:0x5a2018, emissiveIntensity:0.3, transparent:true, opacity:0.42, depthWrite:false, side:THREE.DoubleSide})
};
function dsClone(m){ const c=m.clone(); c.side=THREE.DoubleSide; return c; }

/* ================= renderer / scene ================= */
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(P.bg);
scene.fog = new THREE.FogExp2(P.bg, 0.02);

const camera = new THREE.PerspectiveCamera(46, innerWidth/innerHeight, 0.1, 200);

scene.add(new THREE.HemisphereLight(0x8a7b64, 0x191411, 0.5));
const key = new THREE.DirectionalLight(0xffe0b4, 1.05);
key.position.set(9,15,7);
key.castShadow = true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-18; key.shadow.camera.right=18;
key.shadow.camera.top=18; key.shadow.camera.bottom=-18;
key.shadow.camera.far=50; key.shadow.bias=-0.0015;
scene.add(key);
const rim = new THREE.DirectionalLight(0x5a6a7c, 0.28);
rim.position.set(-8,7,-10); scene.add(rim);
const fillA = new THREE.PointLight(0xb06428, 0.5, 12, 2); fillA.position.set(-3.2,2.6,2.5); scene.add(fillA);
const fillB = new THREE.PointLight(0xb06428, 0.4, 11, 2); fillB.position.set(4.8,2.4,5.4); scene.add(fillB);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(64,64), std({map:T.ground, roughness:0.98}));
ground.rotation.x = -Math.PI/2;
ground.receiveShadow = true;
scene.add(ground);

const gridH = new THREE.GridHelper(44, 22, 0x453b2e, 0x241f1a);
gridH.position.y = 0.02;
gridH.material.transparent = true; gridH.material.opacity = 0.55;
scene.add(gridH);

for(let i=0;i<6;i++){
  const a = i/6*Math.PI*2 + 0.4;
  const r = rr(18,22);
  const p = new THREE.Group();
  const h = rr(3.4,5.2);
  const foot = box(1.5,0.5,1.5,M.stoneDark); foot.position.y=0.25; p.add(foot);
  const shaft = cyl(0.5,0.62,h,7,M.stoneDark); shaft.position.y=h/2+0.4; p.add(shaft);
  const cap = box(1.4,0.4,1.4,M.stoneDark); cap.position.y=h+0.6; p.add(cap);
  p.position.set(2+Math.sin(a)*r, 0, 4+Math.cos(a)*r);
  p.rotation.y = rnd()*Math.PI;
  scene.add(p);
}

/* ================= arc geometry helpers ================= */
const TILE = 2.0, L = 2.0, BW = 1.7, HW = BW/2;
const SPEED = 1.2;
const DIRS = [[1,0],[0,1],[-1,0],[0,-1]];
const DIR_RY = [0, -Math.PI/2, Math.PI, Math.PI/2];
const ARCN = 12, ARCLEN = Math.PI/2;

/* curve chevron texture: rasterized in polar space so every chevron stroke is a
   perfectly STRAIGHT line in world space, stamped tangentially at stations around
   the arc — same visual language as the straight belts, just fanned. */
function mkCurveChev(strokeRGB){
  return (function(){
  const W=256, H=128;
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const g=c.getContext('2d');
  const img=g.createImageData(W,H);
  const w=(BW-0.3)/2, r0=1-w, r1=1+w;
  const N=3;
  const stations=[];
  for(let k=0;k<N;k++){
    const tk=(k+0.5)/N*ARCLEN;
    stations.push([Math.cos(tk), Math.sin(tk)]);
  }
  for(let py=0;py<H;py++){
    const r = r0 + (py+0.5)/H*(r1-r0);
    for(let px=0;px<W;px++){
      const th=(px+0.5)/W*ARCLEN;
      const x=r*Math.cos(th), y=r*Math.sin(th);
      let cr=27, cg=27, cb=29;
      if(py<3 || py>H-4){ cr=20; cg=20; cb=22; }
      else {
        for(const [ax,ay] of stations){
          const dx=x-ax, dy=y-ay;
          const lu=dx*-ay + dy*ax;   // tangential (travel) offset
          const lv=dx*ax + dy*ay;    // radial offset
          if(Math.abs(lv) < 0.6 && Math.abs(lu + 0.5*Math.abs(lv)) < 0.048){
            cr=strokeRGB[0]; cg=strokeRGB[1]; cb=strokeRGB[2]; break;
          }
        }
      }
      const o=(py*W+px)*4;
      img.data[o]=cr; img.data[o+1]=cg; img.data[o+2]=cb; img.data[o+3]=255;
    }
  }

function quadStrip(n, edgeA, edgeB, uScale){
  const pos=[], uv=[], idx=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    const a=edgeA(t), b=edgeB(t);
    pos.push(a[0],a[1],a[2], b[0],b[1],b[2]);
    uv.push(t*uScale,0, t*uScale,1);
  }
  for(let i=0;i<n;i++){
    const k=i*2;
    idx.push(k,k+1,k+2, k+1,k+3,k+2);
  }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  g.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
  g.setIndex(idx);
  g.computeVertexNormals();
  return g;
}
/* curved wall: center C, chirality side, wall centerline radius rc, half-thickness, y span */
function arcWall(C, side, rc, halfTh, y0, y1, mat, uScale){
  const g=new THREE.Group();
  const m=dsClone(mat);
  const e=(r,y)=>t=>{
    const f=Math.PI + side*t*ARCLEN;
    return [C.x+r*Math.cos(f), y, C.z+r*Math.sin(f)];
  };
  const parts=[
    quadStrip(ARCN, e(rc-halfTh,y1), e(rc+halfTh,y1), uScale),  // top
    quadStrip(ARCN, e(rc-halfTh,y0), e(rc-halfTh,y1), uScale),  // inner face
    quadStrip(ARCN, e(rc+halfTh,y0), e(rc+halfTh,y1), uScale)   // outer face
  ];
  for(const geo of parts){
    const mesh=new THREE.Mesh(geo,m);
    mesh.castShadow=true; mesh.receiveShadow=true;
    g.add(mesh);
  }
  for(const t of [0,1]){
    const f=Math.PI + side*t*ARCLEN;
    const cap=new THREE.Mesh(new THREE.PlaneGeometry(halfTh*2, y1-y0), m);
    cap.position.set(C.x+rc*Math.cos(f), (y0+y1)/2, C.z+rc*Math.sin(f));
    cap.rotation.y = Math.atan2(-side*Math.sin(f), side*Math.cos(f));
    g.add(cap);
  }
  return g;
}
function arcFlat(C, side, r0, r1, y, mat, uScale){
  const e=(r)=>t=>{
    const f=Math.PI + side*t*ARCLEN;
    return [C.x+r*Math.cos(f), y, C.z+r*Math.sin(f)];
  };
  const mesh=new THREE.Mesh(quadStrip(ARCN, e(r0), e(r1), uScale), dsClone(mat));
  mesh.castShadow=true; mesh.receiveShadow=true;
  return mesh;
}

/* ================= curved corner piece (any style) =================
   Local frame: travel exits at +X edge (1,0). Input enters from local
   side*Z at (0,side). Quarter arc, center C=(1,side), angle f = PI + side*s,
   s in [0, PI/2]. Radius 1 at centerline. */
function pc_corner(style, side){
  const tier = style<3 ? style : 0;
  const g=new THREE.Group(), anim={slats:[],spins:[],chain:[],spacing:0, corner:{side}};
  const C={x:1, z:side};
  const topY = BELT_STYLES[tier].topY;
  const pt=(r,f,y)=>new THREE.Vector3(C.x+r*Math.cos(f), y, C.z+r*Math.sin(f));

  const fm=Math.PI + side*ARCLEN/2;
  const pm=pt(1,fm,0);
  const ped=box(0.44,0.72,0.44,M.stoneDark);
  ped.position.set(pm.x,0.36,pm.z); ped.rotation.y = -fm;
  g.add(ped);

  const uS = 1.6;
  const w=(BW-0.3)/2, RADN=5;
  const pos=[], uv=[], idx=[];
  for(let i=0;i<=ARCN;i++){
    const t=i/ARCN, f=Math.PI+side*t*ARCLEN;
    for(let k=0;k<=RADN;k++){
      const r=lerp(1-w, 1+w, k/RADN);
      pos.push(C.x+r*Math.cos(f), 0.965, C.z+r*Math.sin(f));
      uv.push(t, k/RADN);
    }
  }
  for(let i=0;i<ARCN;i++)for(let k=0;k<RADN;k++){
    const a0=i*(RADN+1)+k, b0=(i+1)*(RADN+1)+k;
    idx.push(a0,b0,a0+1, b0,b0+1,a0+1);
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos,3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv,2));
  geo.setIndex(idx);
  geo.computeVertexNormals();
  const surf=new THREE.Mesh(geo, dsClone(M.rubberCurveT[tier]));
  surf.castShadow=true; surf.receiveShadow=true;
  g.add(surf);
  g.add(arcWall(C, side, 1+(HW+0.06), 0.06, 0.77, 1.07, M.iron, uS));
  g.add(arcWall(C, side, 1-(HW+0.06), 0.06, 0.77, 1.07, M.iron, uS));
  if(tier>0){
    const mm = [null, M.tierMark2, M.tierMark3][tier];
    g.add(arcWall(C, side, 1+(HW+0.06), 0.016, 1.07, 1.11, mm, uS));
    g.add(arcWall(C, side, 1-(HW+0.06), 0.016, 1.07, 1.11, mm, uS));
  }

  const capF=new THREE.Group();
  const plate=box(0.1,0.3,BW+0.1,M.ironDark);
  plate.position.set(1.03,0.84,0); capF.add(plate);
  g.add(capF);
  const capB=new THREE.Group(); capB.visible=false; g.add(capB);
  const nullRail=new THREE.Group(); g.add(nullRail);

  return {group:g, base:ped, railP:nullRail, railN:nullRail, capF, capB, topY, anim};
}

let AC = null;
function sfxInit(){ if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function tone(f0,f1,dur,type,vol,delay){
  if(!AC) return;
  const t0 = AC.currentTime + (delay||0);
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(Math.max(f1,1), t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(AC.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}

const puffs = [], snaps = [];
const puffGeo = new THREE.SphereGeometry(0.07,6,5);
function puffAt(x,z,y){
  for(let k=0;k<5;k++){
    const p = new THREE.Mesh(puffGeo, std({color:0x3a332b, transparent:true, opacity:0.55, roughness:1}));
    p.castShadow = false;
    p.position.set(x+rr(-0.3,0.3), (y||0.15)+rr(0,0.15), z+rr(-0.3,0.3));
    p.userData.v = [rr(-0.6,0.6), rr(0.8,1.6), rr(-0.6,0.6)];
    scene.add(p);
    puffs.push({m:p, t:0});
  }
}
function snapIn(obj){
  obj.scale.setScalar(0.88);
  snaps.push({m:obj, t:0});
}
function updateFeedback(dt){
  for(let i=puffs.length-1;i>=0;i--){
    const p = puffs[i];
    p.t += dt*2.4;
    p.m.position.x += p.m.userData.v[0]*dt;
    p.m.position.y += p.m.userData.v[1]*dt;
    p.m.position.z += p.m.userData.v[2]*dt;
    p.m.scale.setScalar(1 + p.t*1.4);
    p.m.material.opacity = 0.55*(1-p.t);
    if(p.t>=1){ scene.remove(p.m); puffs.splice(i,1); }
  }
  for(let i=snaps.length-1;i>=0;i--){
    const s = snaps[i];
    s.t += dt*7;
    const k = Math.min(1, s.t);
    s.m.scale.setScalar(0.88 + 0.12*ease(k) + (k<1 ? Math.sin(k*Math.PI)*0.02 : 0));
    if(k>=1){ s.m.scale.setScalar(1); snaps.splice(i,1); }
  }
}

const cells = new Map(); // "i,j" -> {type:'belt'|'arm'|'smelter'|'prop', ...}

function keyOf(i,j){ return i+','+j; }
function tileCenter(i,j){ return new THREE.Vector3(i*TILE, 0, j*TILE); }

function inBounds(i,j){ return Math.abs(i)<=10 && Math.abs(j)<=10; }

/* ================= elevated overpass layer (DSP-style crossings) ================= */
const cells2 = new Map(); // elevated belts, keyed like cells
const ELEV_H = 1.0;       // rise above ground belts; clears the tallest riding item
function smoothstepf(t){ t=clamp(t,0,1); return t*t*(3-2*t); }

function pc_over(){
  const g=new THREE.Group();
  const surf=box(L,0.06,BW-0.3,M.rubber); surf.position.y=1.965; g.add(surf);
  const under=box(L,0.1,BW-0.14,M.ironDark); under.position.y=1.88; g.add(under);
  for(const s of [-1,1]){
    const rail=box(L,0.24,0.1,M.iron); rail.position.set(0,1.97,s*(HW+0.05)); g.add(rail);
    const trim=box(L,0.04,0.03,M.emberPaint); trim.position.set(0,1.86,s*(HW+0.09)); g.add(trim);
  }
  const eF=new THREE.Group(), eB=new THREE.Group(), eP=new THREE.Group(), eN=new THREE.Group();
  g.add(eF); g.add(eB); g.add(eP); g.add(eN);
  return {group:g, base:g, railP:eP, railN:eN, capF:eF, capB:eB, topY:2.0, anim:{slats:[],spins:[],chain:[]}};
}
function pc_ramp(asc){
  const g=new THREE.Group();
  const w=(BW-0.3)/2;
  const yS = t => 0.965 + (asc ? smoothstepf(t) : 1-smoothstepf(t))*ELEV_H;
  // surface strip with flowing chevrons
  const surf=new THREE.Mesh(
    quadStrip(12, t=>[-1+2*t, yS(t), -w], t=>[-1+2*t, yS(t), w], 1.12),
    dsClone(M.rubber));
  surf.castShadow=true; surf.receiveShadow=true; g.add(surf);
  // profile-following rails
  for(const s of [-1,1]){
    const zc=s*(HW+0.05), m=dsClone(M.iron);
    const y0=t=>yS(t)-0.14, y1=t=>yS(t)+0.1;
    for(const geo of [
      quadStrip(12, t=>[-1+2*t, y1(t), zc-0.05], t=>[-1+2*t, y1(t), zc+0.05], 1.1),
      quadStrip(12, t=>[-1+2*t, y0(t), zc-0.05], t=>[-1+2*t, y1(t), zc-0.05], 1.1),
      quadStrip(12, t=>[-1+2*t, y0(t), zc+0.05], t=>[-1+2*t, y1(t), zc+0.05], 1.1)
    ]){
      const mesh=new THREE.Mesh(geo,m);
      mesh.castShadow=true; mesh.receiveShadow=true; g.add(mesh);
    }
  }
  // legs: short pair at low end, trestle pair at high end
  const lowX = asc ? -0.78 : 0.78, highX = -lowX;
  for(const s of [-1,1]){
    const leg=box(0.13,0.8,0.13,M.ironDark); leg.position.set(lowX,0.4,s*(HW-0.06)); g.add(leg);
    const tall=box(0.14,1.82,0.14,M.ironDark); tall.position.set(highX,0.91,s*(HW-0.06)); g.add(tall);
  }
  const brace=box(0.09,0.09,BW-0.12,M.ironDark); brace.position.set(highX,1.35,0); g.add(brace);
  const eF=new THREE.Group(), eB=new THREE.Group(), eP=new THREE.Group(), eN=new THREE.Group();
  g.add(eF); g.add(eB); g.add(eP); g.add(eN);
  return {group:g, base:g, railP:eP, railN:eN, capF:eF, capB:eB, topY:2.0, anim:{slats:[],spins:[],chain:[]}};
}
function placeElevated(i,j,dir){
  if(cells2.has(keyOf(i,j)) || !inBounds(i,j)) return false;
  const pc=pc_over();
  pc.group.position.copy(tileCenter(i,j));
  pc.group.rotation.y=DIR_RY[dir];
  pc.group.traverse(o=>{ o.userData.tileKey=keyOf(i,j); });
  beltLayer.add(pc.group);
  cells2.set(keyOf(i,j), {type:'belt', elev:true, i, j, dir, style:0, shape:'straight', pc});
  updateCounter();
  return true;
}
function placeRamp(i,j,dir,kind){
  if(cells.has(keyOf(i,j)) || !inBounds(i,j)) return false;
  const pc=pc_ramp(kind==='up');
  pc.group.position.copy(tileCenter(i,j));
  pc.group.rotation.y=DIR_RY[dir];
  pc.group.traverse(o=>{ o.userData.tileKey=keyOf(i,j); });
  beltLayer.add(pc.group);
  cells.set(keyOf(i,j), {type:'belt', ramp:kind, i, j, dir, style:0, shape:'straight', pc});
  refreshConnections(i,j);

function removeElev(i,j){

function buildBeltPC(style, dir, shape, h){
  _s = 4242 + style*97 + h*13;
  if(shape==='straight') return BELT_STYLES[style].build(h);
  return pc_corner(style, shape==='cornerP' ? 1 : -1);
}

function placeBelt(i,j,dir,style){
  if(cells.has(keyOf(i,j)) || !inBounds(i,j)) return false;
  const rec = {type:'belt', i, j, dir, style, shape:'straight', pc:null, _fresh:true};
  cells.set(keyOf(i,j), rec);
  mountBelt(rec, 'straight');
  refreshConnections(i,j);
  updateCounter();
  return true;
}
function mountBelt(rec, shape){
  if(rec.pc) beltLayer.remove(rec.pc.group);
  rec.shape = shape;
  rec.pc = buildBeltPC(rec.style, rec.dir, shape, Math.abs(rec.i*7+rec.j*13));
  rec.pc.group.position.copy(tileCenter(rec.i,rec.j));
  rec.pc.group.rotation.y = DIR_RY[rec.dir];
  rec.pc.group.traverse(o=>{ o.userData.tileKey = keyOf(rec.i,rec.j); });
  beltLayer.add(rec.pc.group);
  if(rec._fresh){ snapIn(rec.pc.group); rec._fresh = false; }
}
function removeAt(i,j){
  const rec = cells.get(keyOf(i,j));
  if(!rec || rec.type==='prop') return false;
  if(rec.type==='sorter'){ removeSorter(rec.core); return true; }
  if(rec.type==='assembler'){ removeAssembler(rec.core); return true; }
  if(rec.type==='storage'){ removeStorage(rec.core); return true; }
  if(rec.type==='belt') beltLayer.remove(rec.pc.group);
  else scene.remove(rec.group);
  cells.delete(keyOf(i,j));
  refreshConnections(i,j);
  updateCounter();
  return true;
}
function rotateAt(i,j){
  const rec = cells.get(keyOf(i,j));
  if(!rec || rec.type==='prop' || rec.ramp || rec.type==='sorter' || rec.type==='assembler' || rec.type==='storage') return false;
  rec.dir = (rec.dir+1)%4;
  if(rec.type==='belt'){
    rec.pc.group.rotation.y = DIR_RY[rec.dir];
    refreshConnections(i,j);
  } else if(rec.type==='arm'){
    if(rec.markers) rec.markers.rotation.y = DIR_RY[rec.dir]; // rig itself stays; yaw is absolute
  } else {
    rec.group.rotation.y = DIR_RY[rec.dir];
    refreshConnections(i,j);
  }
  return true;
}
function restyleBelt(i,j,style){
  const rec = cells.get(keyOf(i,j));
  if(!rec || rec.type!=='belt' || rec.ramp || rec.style===style) return false;
  rec.style = style;
  mountBelt(rec, rec.shape);
  refreshConnections(i,j);
  return true;
}

/* shape + connection pass. A belt fed only from one perpendicular side
   becomes a curve; caps hide against connected neighbors and smelter mouths. */
function wouldBeShapeG(i,j,dir,get){
  const d = DIRS[dir];
  const back = get(keyOf(i-d[0], j-d[1]));
  const backFeed = back && back.type==='belt' && back.ramp!=='up' && back.dir===dir;
  const lat = [-d[1], d[0]]; // local +Z in world
  const nP = get(keyOf(i+lat[0], j+lat[1]));
  const nN = get(keyOf(i-lat[0], j-lat[1]));
  const feedsP = nP && nP.type==='belt' && nP.ramp!=='up' && DIRS[nP.dir][0]===-lat[0] && DIRS[nP.dir][1]===-lat[1];
  const feedsN = nN && nN.type==='belt' && nN.ramp!=='up' && DIRS[nN.dir][0]===lat[0] && DIRS[nN.dir][1]===lat[1];
  if(!backFeed && feedsP && !feedsN) return 'cornerP';
  if(!backFeed && feedsN && !feedsP) return 'cornerN';
  return 'straight';
}
function wouldBeShape(i,j,dir){ return wouldBeShapeG(i,j,dir, k=>cells.get(k)); }
function shapeOf(rec){ return wouldBeShape(rec.i, rec.j, rec.dir); }
function refreshConnections(ci,cj){
  const seen = new Set();
  const spots = [[ci,cj],[ci+1,cj],[ci-1,cj],[ci,cj+1],[ci,cj-1]];
  for(const [i,j] of spots){
    const k = keyOf(i,j);
    if(seen.has(k)) continue; seen.add(k);
    const rec = cells.get(k);
    if(!rec) continue;
    if(rec.type==='storage'){ updateStorageStubs(rec); continue; }
    if(rec.type==='assembler'){ if(rec.part===0) updateAssemblerStubs(rec.core); continue; }
    if(rec.type==='splitter' || rec.type==='merger'){ updateHubStubs(rec); continue; }
    if(rec.type!=='belt') continue;
    if(rec.ramp) continue;
    const want = shapeOf(rec);
    if(want !== rec.shape) mountBelt(rec, want);
    const d = DIRS[rec.dir];
    const fwd  = cells.get(keyOf(i+d[0], j+d[1]));
    const back = cells.get(keyOf(i-d[0], j-d[1]));
    const fwdBelt = fwd && fwd.type==='belt';
    const fwdMouth = fwd && ((fwd.type==='smelter' && fwd.dir===rec.dir) ||
                             (fwd.type==='storage' && fwd.part===0 && fwd.dir===rec.dir) ||
                             (fwd.type==='sorter' && sorterAccepts({core:fwd.core, part:fwd.part}, rec.dir)) ||
                             (fwd.type==='assembler' && assemblerAccepts(fwd, rec.dir)) ||
                             ((fwd.type==='splitter'||fwd.type==='merger') && hubAccepts(fwd, rec.dir)));
    rec.pc.capF.visible = !(fwdBelt || fwdMouth);
    if(rec.shape==='straight'){
      rec.pc.capB.visible = !(back && ((back.type==='belt' && back.dir===rec.dir) ||
                              (back.type!=='belt' && back.type!=='prop')));
      const lat = [-d[1], d[0]];
      const nP = cells.get(keyOf(i+lat[0], j+lat[1]));
      const nN = cells.get(keyOf(i-lat[0], j-lat[1]));
      const feedsP = nP && nP.type==='belt' && nP.ramp!=='up' && DIRS[nP.dir][0]===-lat[0] && DIRS[nP.dir][1]===-lat[1];
      const feedsN = nN && nN.type==='belt' && nN.ramp!=='up' && DIRS[nN.dir][0]===lat[0] && DIRS[nN.dir][1]===lat[1];
      rec.pc.railP.visible = !feedsP;
      rec.pc.railN.visible = !feedsN;
    }
  }
}

function updateHubStubs(rec){
  for(let k=0;k<4;k++){
    const w = (k + rec.dir)%4;
    const n = cells.get(keyOf(rec.i+DIRS[w][0], rec.j+DIRS[w][1]));
    const feeds = !!(n && n.type==='belt' && n.ramp!=='up' && n.dir===(w+2)%4);
    const takes = !!(n && n.type==='belt' && n.ramp!=='up' && n.dir===w);
    rec.stubsIn[k].visible = feeds;
    rec.stubsOut[k].visible = takes && !feeds;
  }
}
/* animation: one global phase, all pieces in lockstep -> seamless runs */
let phase = 0;
const phases = [0,0,0];
function tierOf(rec){ return (rec.style>=0 && rec.style<3) ? rec.style : 0; }
function updatePieces(dt){
  for(let t=0;t<3;t++){
    phases[t] += TIER_SPEED[t]*dt;
    T.chevronT[t].offset.x = -mod(phases[t], 1) * (2/L);
    T.curveChevT[t].offset.x = -mod(phases[t], ARCLEN) / ARCLEN;
  }
  phase = phases[0];
  for(const rec of cells.values()){
    if(rec.type!=='belt') continue;
    const t = tierOf(rec), ph = phases[t], spd = TIER_SPEED[t];
    const a = rec.pc.anim;
    if(a.corner){
      const side = a.corner.side, span = ARCLEN;
      for(const s of a.slats){
        const sc = mod(s.off + ph, span);
        const f = Math.PI + side*sc;
        s.m.position.x = 1 + Math.cos(f);
        s.m.position.z = side + Math.sin(f);
        s.m.rotation.y = Math.PI/2 - f;
      }
    } else {
      for(const s of a.slats) s.m.position.x = -L/2 + mod(s.off + ph, L);
      for(const c of a.chain) c.m.position.x = -L/2 + mod(c.off + ph, L);
    }
    for(const sp of a.spins){
      if(sp.z) sp.m.rotation.z -= spd*dt/sp.r * sp.sign;
      else     sp.m.rotation.y += spd*dt/sp.r * sp.sign;
    }
  }
}

/* ================= riders ================= */
const riders = [];
function ridersOn(i,j){
  let n=0;
  for(const r of riders){
    if(r.falling || r.layer!==0) continue;
    const [ti,tj]=tileAt(r.mesh.position.x, r.mesh.position.z);
    if(ti===i&&tj===j) n++;
  }
  return n;
}
function addRider(mesh, x, y, z){
  mesh.traverse(o=>{ if(o.material){ o.material=o.material.clone(); o.material.transparent=true; } });
  mesh.position.set(x,y,z);
  scene.add(mesh);
  const r={mesh, half:mesh.userData.half||0.2, falling:false, claimed:false, vy:0, rest:0, ax:1, az:0, layer:0};
  riders.push(r);
  updateCounter();
  return r;
}
function spawnRiderAt(mesh, i, j){
  const c = tileCenter(i,j);
  const rec = cells.get(keyOf(i,j));
  const topY = (rec && rec.type==='belt') ? rec.pc.topY : 1;
  return addRider(mesh, c.x+rr(-0.08,0.08), topY+(mesh.userData.half||0.2), c.z+rr(-0.08,0.08));
}
function dropRider(r){ r.falling = true; r.vy = 0.6; }

function stalledAhead(r, m){
  for(const o of riders){
    if(o===r || o.falling) continue;
    if(Math.abs(o.mesh.position.y - m.position.y) > 0.5) continue; // other layer
    const dx = o.mesh.position.x - m.position.x;
    const dz = o.mesh.position.z - m.position.z;
    const ahead = dx*r.ax + dz*r.az;
    const side2 = Math.abs(dx*-r.az + dz*r.ax);
    if(ahead > 0.04 && ahead < 0.55 && side2 < 0.45) return true;
  }
  return false;
}
function updateRiders(dt){
  for(let n=riders.length-1;n>=0;n--){
    const r = riders[n], m = r.mesh;
    if(r.claimed) continue;
    if(!r.falling){
      const [ti,tj] = tileAt(m.position.x, m.position.z);
      let cell;
      if(r.layer===1){
        cell = cells2.get(keyOf(ti,tj));
        if(!cell){
          const gr = cells.get(keyOf(ti,tj));
          if(gr && gr.type==='belt' && gr.ramp) cell = gr; // descend the ramp
        }
      } else {
        cell = cells.get(keyOf(ti,tj));
      }
      if(cell && cell.type==='belt'){
        const rec = cell;
        const beltSpd = TIER_SPEED[tierOf(rec)];
        r.spd = beltSpd;
        const adv = stalledAhead(r, m) ? 0 : beltSpd*dt;
        const c = tileCenter(ti,tj);
        if(rec.shape==='straight'){
          const d = DIRS[rec.dir];
          r.ax = d[0]; r.az = d[1];
          const rx = m.position.x - c.x, rz = m.position.z - c.z;
          let along = rx*d[0] + rz*d[1];
          let lx = rx - d[0]*along, lz = rz - d[1]*along;
          along += adv;
          // queue up at the edge when a transfer arm waits ahead, or storage is full
          if(along > 0.72){
            const fwd = cells.get(keyOf(ti+d[0], tj+d[1]));
            if(fwd && ((fwd.type==='arm' && DIRS[fwd.dir][0]===d[0] && DIRS[fwd.dir][1]===d[1]) ||
                       (fwd.type==='storage' && !storageAccepts(fwd, rec.dir)) ||
                       (fwd.type==='smelter' && fwd.dir===rec.dir && fwd.queue >= SMELT_Q) ||
                       (fwd.type==='sorter' && !sorterAccepts(fwd, rec.dir)) ||
                       (fwd.type==='assembler' && !assemblerAccepts(fwd, rec.dir)) ||
                       ((fwd.type==='splitter'||fwd.type==='merger') && !hubAccepts(fwd, rec.dir)))) along = Math.min(along, 0.72);
          }
          const damp = Math.max(0, 1 - 5*dt);
          lx *= damp; lz *= damp;
          m.position.x = c.x + d[0]*along + lx;
          m.position.z = c.z + d[1]*along + lz;
          if(rec.ramp){
            const t = clamp((along+1)/2, 0, 1);
            const h = rec.ramp==='up' ? smoothstepf(t) : 1-smoothstepf(t);
            m.position.y = 1.0 + h*ELEV_H + r.half;
            r.layer = rec.ramp==='up' ? 1 : 0;
          } else {
            m.position.y = rec.pc.topY + r.half;
          }
        } else {
          const side = rec.shape==='cornerP' ? 1 : -1;
          const ry = DIR_RY[rec.dir];
          const cos = Math.cos(ry), sin = Math.sin(ry);
          const wx = m.position.x - c.x, wz = m.position.z - c.z;
          let lx = wx*cos - wz*sin, lz = wx*sin + wz*cos;
          const dxr = lx - 1, dzr = lz - side;
          let rad = Math.sqrt(dxr*dxr + dzr*dzr);
          let f = Math.atan2(dzr, dxr);
          // tangent heading (world) for stall/fall momentum
          const txl = -side*Math.sin(f), tzl = side*Math.cos(f);
          r.ax = txl*cos + tzl*sin;
          r.az = -txl*sin + tzl*cos;
          f += side * adv / Math.max(rad, 0.45);
          rad += (1 - rad) * Math.min(1, 5*dt);
          lx = 1 + rad*Math.cos(f);
          lz = side + rad*Math.sin(f);
          m.position.x = c.x + lx*cos + lz*sin;
          m.position.z = c.z - lx*sin + lz*cos;
          m.position.y = rec.pc.topY + r.half;
        }
      } else if(cell && cell.type==='smelter' &&
                (r.ax*DIRS[cell.dir][0] + r.az*DIRS[cell.dir][1]) > 0.5){
        const d = DIRS[cell.dir], c = tileCenter(cell.i, cell.j);
        const along = (m.position.x-c.x)*d[0] + (m.position.z-c.z)*d[1];
        if(along < -0.14){
          // ride the intake belt deep into the tunnel; hold at the mouth while the furnace is full
          r.ax = d[0]; r.az = d[1]; r.spd = SPEED;
          if(!stalledAhead(r, m)){
            const step = Math.min(SPEED*dt, Math.max(0, (cell.queue >= SMELT_Q ? -0.52 : -0.12) - along));
            m.position.x += d[0]*step;
            m.position.z += d[1]*step;
          }
          m.position.y = 1.0 + r.half;
          const na = (m.position.x-c.x)*d[0] + (m.position.z-c.z)*d[1];
          if(na >= -0.14 && cell.queue < SMELT_Q) consumeIntoSmelter(cell, r, n);
        } else if(along > 0.26){
          // fresh ingot riding out the far port
          m.position.x += d[0]*SPEED*dt;
          m.position.z += d[1]*SPEED*dt;
          m.position.y = 1.0 + r.half;
        } else {
          consumeIntoSmelter(cell, r, n);
        }
      } else if(cell && cell.type==='storage'){
        const core = cell.core, d = DIRS[core.dir];
        const aligned = r.ax*d[0] + r.az*d[1] > 0.5;
        if(!aligned){ dropRider(r); }
        else {
          const c = tileCenter(cell.i, cell.j);
          const along = (m.position.x-c.x)*d[0] + (m.position.z-c.z)*d[1];
          if(cell.part===1 && along > 0.26){
            // withdrawn item riding out the exit tunnel
            m.position.x += d[0]*SPEED*dt;
            m.position.z += d[1]*SPEED*dt;
            m.position.y = 1.0 + r.half;
          } else if(cell.part===0){
            if(along < -0.3){
              // ride in through the intake; hold at the mouth when full
              if(!stalledAhead(r, m)){
                const stop = core.count < core.cap ? -0.28 : -0.58;
                const step = Math.min(SPEED*dt, Math.max(0, stop - along));
                m.position.x += d[0]*step;
                m.position.z += d[1]*step;
              }
              m.position.y = 1.0 + r.half;
            } else if(core.count < core.cap){
              depositRider(core, r, n);
            } else {
              m.position.y = 1.0 + r.half; // full: wait at the mouth
            }
          } else {
            dropRider(r);
          }
        }
      } else if(cell && cell.type==='sorter'){
        const c = tileCenter(cell.i, cell.j);
        const along = (m.position.x-c.x)*r.ax + (m.position.z-c.z)*r.az;
        if(along > 0.3){
          // ejected item riding out through an aperture
          m.position.x += r.ax*SPEED*dt;
          m.position.z += r.az*SPEED*dt;
          m.position.y = 1.0 + r.half;
        } else {
          const di = DIRS.findIndex(dd=>Math.abs(dd[0]-r.ax)<0.5 && Math.abs(dd[1]-r.az)<0.5);
          if(di>=0 && sorterAccepts(cell, di)){
            if(along < -0.35){
              if(!stalledAhead(r, m)){
                m.position.x += r.ax*SPEED*dt;
                m.position.z += r.az*SPEED*dt;
              }
              m.position.y = 1.0 + r.half;
            } else sorterIntake(cell, r, n);
          } else dropRider(r);
        }
      } else {
        dropRider(r);
      }
    } else {
      r.vy -= 12*dt;
      m.position.y += r.vy*dt;
      const fs = (r.spd||SPEED)*0.75;
      m.position.x += r.ax*fs*dt;
      m.position.z += r.az*fs*dt;
      m.rotation.x += 2.2*dt;
      if(m.position.y <= r.half+0.02){
        m.position.y = r.half+0.02;
        m.rotation.x = 0;
        if(r.vy < -1.8){ r.vy = -r.vy*0.28; } else { r.vy = 0; r.rest += dt; r.ax*=0.6; r.az*=0.6; }
      }
      if(r.rest > 1.0){
        let done = true;
        m.traverse(o=>{ if(o.material){ o.material.opacity -= dt*1.6; if(o.material.opacity>0) done=false; } });
        if(done){ scene.remove(m); riders.splice(n,1); updateCounter(); }
      }
    }
  }
}

const MACH_ACCENT = [null, null, null]; // filled after M is available at runtime use
const TIER_PAINT = ()=>[M.emberPaint, M.tierMark2, M.tierMark3];
const TIER_NAME = ['MK·I','MK·II','MK·III'];

/* port materials + hover glow */
const M_portIn  = std({color:0x4c7245, emissive:0x3a6b34, emissiveIntensity:0.45, roughness:0.55});
const M_portOut = std({color:0x8a4a1e, emissive:0x9a5a1e, emissiveIntensity:0.45, roughness:0.55});
function dirIndexOf(vx,vz){ return DIRS.findIndex(d=>d[0]===vx && d[1]===vz); }

/* real port aperture: jambs + lintel opening into a pitch-black tunnel cavity.
   Cavity extends toward local -X; orient the frame so -X points INTO the machine. */
const M_void = new THREE.MeshBasicMaterial({color:0x060504});
function portFrame(openW, openBot, openTop, wallTop, faceW, th, mat, depth){
  depth = depth===undefined ? 0.75 : depth;
  const g = new THREE.Group();
  const jambW = (faceW - openW) / 2;
  for(const s of [-1,1]){
    const jamb = box(th, wallTop, jambW, mat);
    jamb.position.set(0, wallTop/2, s*(openW/2 + jambW/2));
    g.add(jamb);
  }
  const lintel = box(th, wallTop-openTop, openW, mat);
  lintel.position.set(0, (wallTop+openTop)/2, 0);
  g.add(lintel);
  if(openBot > 0.02){
    const sill = box(th, openBot, openW, mat);
    sill.position.set(0, openBot/2, 0);
    g.add(sill);
  }
  // faded shadow veils: items visibly dim as they pass, still readable through them
  if(depth < 0.01) return g;
  const oh = openTop - openBot;
  for(let v=0; v<3; v++){
    const veil = new THREE.Mesh(new THREE.PlaneGeometry(openW-0.02, oh-0.02),
      new THREE.MeshBasicMaterial({color:0x030202, fog:false, transparent:true,
        opacity:0.3 + v*0.25, depthWrite:false, side:THREE.DoubleSide}));
    veil.rotation.y = Math.PI/2;
    veil.position.set(-0.08 - v*(depth/3), (openTop+openBot)/2, 0);
    veil.castShadow = false;
    g.add(veil);
  }
  return g;
}
function fadeVeilsZ(w, h, yMid, zFace, sIn, n){
  // veils facing ±Z, receding inward (for hand-built apertures)
  const g = new THREE.Group();
  for(let v=0; v<(n||3); v++){
    const veil = new THREE.Mesh(new THREE.PlaneGeometry(w, h),
      new THREE.MeshBasicMaterial({color:0x030202, fog:false, transparent:true,
        opacity:0.3 + v*0.25, depthWrite:false, side:THREE.DoubleSide}));
    veil.position.set(0, yMid, zFace + sIn*(0.06 + v*0.16));
    veil.castShadow = false;
    g.add(veil);
  }
  return g;
}

/* port markers: green = input, ember = output; arrows point along item flow */
const PORT_SHAPE = (()=>{ const s=new THREE.Shape();
  s.moveTo(-0.18,-0.14); s.lineTo(0.18,0); s.lineTo(-0.18,0.14); s.lineTo(-0.08,0); s.lineTo(-0.18,-0.14); return s; })();
function portArrow(inbound, yaw){
  const g = new THREE.Group();
  const m = new THREE.Mesh(new THREE.ShapeGeometry(PORT_SHAPE),
    std({color:inbound?0x4c7245:0xb06a20, emissive:inbound?0x35592f:0x8a4a1e, emissiveIntensity:0.5,
         transparent:true, opacity:0.92, depthWrite:false, side:THREE.DoubleSide}));
  m.rotation.x = -Math.PI/2;
  g.add(m);
  g.rotation.y = yaw||0;
  return g;
}

/* integrated belt stub: chevron surface phase-aligned with adjacent belt pieces */
function beltStub(x0, x1){
  const g = new THREE.Group();
  const w = (BW-0.3)/2;
  const geo = quadStrip(1, t=>[x0+t*(x1-x0),0.965,-w], t=>[x0+t*(x1-x0),0.965,w], (x1-x0)/2);
  const uv = geo.attributes.uv;
  const base = (x0+1)/2;
  for(let i=0;i<uv.count;i++) uv.setX(i, uv.getX(i)+base);
  const surf = new THREE.Mesh(geo, dsClone(M.rubber));
  surf.castShadow=true; surf.receiveShadow=true;
  g.add(surf);
  for(const s of [-1,1]){
    const rail = box(x1-x0, 0.16, 0.08, M.iron);
    rail.position.set((x0+x1)/2, 0.95, s*(HW+0.04));
    g.add(rail);
  }
  return g;
}

/* ================= storage container (closed, gauged) ================= */
const STORE_CAP = 24;
const STORE_CAPS = [24, 48, 96];
function buildStorage(){
  const g = new THREE.Group(); // local origin = part0 tile center; +X flow; extends to x=3
  const fillBars = [];
  const base = box(3.95,0.14,1.95,M.stoneDark); base.position.set(1,0.07,0); g.add(base);
  // corner + mid posts
  for(const z of [-0.86,0.86]){
    for(const x of [-0.86, 1, 2.86]){
      const post = box(0.18,1.66,0.18,M.iron); post.position.set(x,0.97,z); g.add(post);
    }
  }
  // long ribbed side panels with big fill gauges
  for(const s of [-1,1]){
    const panel = box(3.5,1.3,0.09,M.ironDark); panel.position.set(1,0.95,s*0.84); g.add(panel);
    for(const rx of [-0.4,0.35,1.65,2.4]){
      const rib = box(0.07,1.26,0.11,M.iron); rib.position.set(rx,0.95,s*0.85); g.add(rib);
    }
    const slot = box(0.9,0.16,0.05,M.dark); slot.position.set(1,1.38,s*0.9); g.add(slot);
    const bar = new THREE.Mesh(new THREE.BoxGeometry(1,0.1,0.03), M.amber.clone());
    bar.position.set(0.58, 1.38, s*0.92);
    bar.scale.x = 0.001; bar.visible = false;
    g.add(bar); fillBars.push(bar);
    const hz = box(0.5,0.1,0.02,M.hazard); hz.position.set(2.2,0.3,s*0.9); g.add(hz);
  }
  // interior dim backdrop
  const backdrop = box(3.3,1.1,1.1,M.dark); backdrop.position.set(1,0.9,0); backdrop.castShadow=false; g.add(backdrop);
  // intake tunnel (back) + exit tunnel (front)
  const pin = portFrame(1.5, 0.42, 1.55, 1.76, 1.9, 0.1, M.ironDark, 0.5);
  pin.position.x = -0.86; pin.rotation.y = Math.PI;
  g.add(pin);
  const pout = portFrame(1.5, 0.42, 1.55, 1.76, 1.9, 0.1, M.ironDark, 0.5);
  pout.position.x = 2.86;
  g.add(pout);
  // roof + hatches
  const lid = box(3.98,0.12,1.98,M.iron); lid.position.set(1,1.83,0); g.add(lid);
  for(const hx of [0.15,1.85]){
    const hatch = box(0.62,0.08,0.62,M.ironDark); hatch.position.set(hx,1.93,0); g.add(hatch);
    const handle = box(0.26,0.05,0.08,M.steel); handle.position.set(hx,1.99,0.14); g.add(handle);
  }
  const chip = box(0.14,0.14,0.03,M.amber); chip.position.set(2.7,1.9,0.7); g.add(chip);
  // arrows: one in, one out
  const ain = portArrow(true, 0);  ain.position.set(-0.98, 1.02, 0);  g.add(ain);
  const aout = portArrow(false, 0); aout.position.set(2.98, 1.02, 0); g.add(aout);
  // stubs: intake at the back, exit at the front (shown when connected)
  const stubIn = beltStub(-1,-0.3); stubIn.visible = false; g.add(stubIn);
  const stubOut = beltStub(0.3,1.0); stubOut.position.x = 2; stubOut.visible = false; g.add(stubOut);
  return {group:g, fillBars, stubIn, stubOut};
}
function setFill(core){
  const frac = clamp(core.count / core.cap, 0, 1);
  for(const b of core.fillBars){
    b.visible = core.count > 0;
    b.scale.x = Math.max(frac, 0.001);
    b.position.x = 0.58 + frac*0.84/2;
  }
}
function placeStorage(i,j,dir){
  const d = DIRS[dir];
  const tiles = [[i,j],[i+d[0],j+d[1]]];
  for(const [ti,tj] of tiles){
    if(!inBounds(ti,tj) || cells.has(keyOf(ti,tj)) || cells2.has(keyOf(ti,tj))) return false;
  }
  _s = 620+i*13+j*29;
  const b = buildStorage();
  b.group.position.copy(tileCenter(i,j));
  b.group.rotation.y = DIR_RY[dir];
  const core = {origin:[i,j], dir, cap:48, count:0, stored:[], group:b.group,
    fillBars:b.fillBars, stubIn:b.stubIn, stubOut:b.stubOut, t:0};
  b.group.traverse(o=>{ o.userData.tileKey = keyOf(i,j); });
  scene.add(b.group); snapIn(b.group);
  tiles.forEach(([ti,tj],k)=>{
    cells.set(keyOf(ti,tj), {type:'storage', i:ti, j:tj, part:k, core, dir});
  });
  refreshConnections(i,j);
  refreshConnections(tiles[1][0], tiles[1][1]);
  updateCounter();
  return true;
}
function removeStorage(core){
  scene.remove(core.group);
  const d = DIRS[core.dir], [i,j] = core.origin;
  for(let k=0;k<2;k++) cells.delete(keyOf(i+k*d[0], j+k*d[1]));
  refreshConnections(i,j);
  refreshConnections(i+d[0], j+d[1]);
  updateCounter();
}
function storageAccepts(cell, dirIdx){
  return cell.part===0 && dirIdx===cell.core.dir && cell.core.count < cell.core.cap;
}
function depositMesh(core, mesh){
  if(mesh.parent) mesh.parent.remove(mesh);
  core.stored.push(mesh);
  core.count++;
  setFill(core);
}
function depositRider(core, r, idx){
  scene.remove(r.mesh);
  riders.splice(idx,1);
  depositMesh(core, r.mesh);
  updateCounter();
}
function withdrawMesh(core){
  const mesh = core.stored.pop();
  core.count--;
  setFill(core);
  return mesh;
}
/* storage belt-through: eject stored items out the front onto an outward belt */
function updateStorages(dt){
  for(const cell of cells.values()){
    if(cell.type!=='storage' || cell.part!==0) continue;
    const core = cell.core;
    core.t -= dt;
    if(core.count <= 0 || core.t > 0) continue;
    const d = DIRS[core.dir];
    const oi = core.origin[0]+2*d[0], oj = core.origin[1]+2*d[1];
    const n = cells.get(keyOf(oi,oj));
    if(n && n.type==='belt' && !n.ramp && n.dir===core.dir && ridersOn(oi,oj) < 2){
      const mesh = withdrawMesh(core);
      const c1 = tileCenter(core.origin[0]+d[0], core.origin[1]+d[1]);
      const r2 = addRider(mesh, c1.x + d[0]*0.3, 1.0 + (mesh.userData.half||0.2), c1.z + d[1]*0.3);
      r2.ax = d[0]; r2.az = d[1];
      core.t = 0.35;
      updateCounter();
    }
  }
}
function updateStorageStubs(cell){
  const core = cell.core, d = DIRS[core.dir];
  const [i,j] = core.origin;
  const back = cells.get(keyOf(i-d[0], j-d[1]));
  core.stubIn.visible = !!(back && back.type==='belt' && back.ramp!=='up' && back.dir===core.dir);
  const front = cells.get(keyOf(i+2*d[0], j+2*d[1]));
  core.stubOut.visible = !!(front && front.type==='belt' && front.ramp!=='up' && front.dir===core.dir);
}

/* ================= splitter & merger hubs ================= */
const HUB_Q = 3;
function buildHub(isSplitter){
  const g = new THREE.Group();
  const pad = box(1.95,0.14,1.95,M.stoneDark); pad.position.y=0.07; g.add(pad);
  for(const [sx,sz] of [[-1,-1],[1,-1],[-1,1],[1,1]]){
    const post = box(0.18,1.6,0.18,M.iron); post.position.set(sx*0.84,0.94,sz*0.84); g.add(post);
  }
  // four full tunnel faces, trims colored by role (green in / ember out)
  const backdrop = box(1.1,1.1,1.1,M.dark); backdrop.position.y=0.92;
  backdrop.castShadow=false; g.add(backdrop);
  const roles = isSplitter ? ['out','out','in','out'] : ['out','in','in','in']; // local +X, +Z, -X, -Z
  for(let k=0;k<4;k++){
    const face = new THREE.Group();
    face.rotation.y = DIR_RY[k];
    const pf = portFrame(1.4, 0.42, 1.5, 1.7, 1.86, 0.1, M.ironDark, 0.45);
    pf.position.x = 0.85;
    face.add(pf);
    const tm = roles[k]==='in' ? M_portIn : M_portOut;
    const trim = box(0.07,0.07,1.44,tm); trim.position.set(0.88,1.55,0); face.add(trim);
    const sillT = box(0.07,0.06,1.44,tm); sillT.position.set(0.88,0.44,0); face.add(sillT);
    g.add(face);
  }
  // turbine cap like the reference
  const lid = box(1.9,0.1,1.9,M.iron); lid.position.y=1.76; g.add(lid);
  const cap = cyl(0.55,0.85,0.3,8,M.ironDark); cap.position.y=1.94; g.add(cap);
  const disc = cyl(0.46,0.46,0.1,16,M.dark); disc.position.y=2.12; g.add(disc);
  const hubcap = cyl(0.16,0.16,0.06,10,M.iron); hubcap.position.y=2.18; g.add(hubcap);
  const lamp = box(0.12,0.07,0.12,M.emberGlow.clone()); lamp.position.set(0.6,1.84,0.6); g.add(lamp);
  const hz = box(0.5,0.1,0.02,M.hazard); hz.position.set(0,0.28,0.95); g.add(hz);
  // arrows above the tunnels
  const mk = (inb, yaw, x, z)=>{ const a=portArrow(inb,yaw); a.position.set(x*1.04,1.02,z*1.04); a.scale.setScalar(1.0); g.add(a); };
  if(isSplitter){
    mk(true, 0, -0.95, 0);
    mk(false, 0, 0.95, 0);
    mk(false, -Math.PI/2, 0, 0.95);
    mk(false, Math.PI/2, 0, -0.95);
  } else {
    mk(true, 0, -0.95, 0);
    mk(true, -Math.PI/2, 0, -0.95);
    mk(true, Math.PI/2, 0, 0.95);
    mk(false, 0, 0.95, 0);
  }
  // per-face stubs: inward + outward variants, shown per connection
  const stubsIn = [], stubsOut = [];
  for(let k=0;k<4;k++){
    const si = beltStub(-1,-0.26);
    si.rotation.y = DIR_RY[(k+2)%4];
    si.visible = false;
    g.add(si); stubsIn.push(si);
    const so = beltStub(0.26,1.0);
    so.rotation.y = DIR_RY[k];
    so.visible = false;
    g.add(so); stubsOut.push(so);
  }
  return {group:g, lamp, stubsIn, stubsOut};
}
function placeHub(i,j,dir,kind){
  if(cells.has(keyOf(i,j)) || !inBounds(i,j)) return false;
  _s = 480+i*5+j*9;
  const b = buildHub(kind==='splitter');
  b.group.position.copy(tileCenter(i,j));
  b.group.rotation.y = DIR_RY[dir];
  b.group.traverse(o=>{ o.userData.tileKey = keyOf(i,j); });
  scene.add(b.group); snapIn(b.group);
  cells.set(keyOf(i,j), {type:kind, i, j, dir, group:b.group, lamp:b.lamp,
    stubsIn:b.stubsIn, stubsOut:b.stubsOut, queue:[], t:0, rr:0, blockT:0});
  refreshConnections(i,j);
  updateCounter();
  return true;
}
function hubAccepts(cell, dirIdx){
  if(cell.queue.length >= HUB_Q) return false;
  if(cell.type==='splitter') return dirIdx===cell.dir; // back only
  // merger: back or either side inward
  if(dirIdx===cell.dir) return true;
  const lat = [-DIRS[cell.dir][1], DIRS[cell.dir][0]];
  const mv = DIRS[dirIdx];
  return Math.abs(mv[0]*lat[0]+mv[1]*lat[1]) > 0.5;
}
function updateHubs(dt){
  for(const cell of cells.values()){
    if(cell.type!=='splitter' && cell.type!=='merger') continue;
    cell.t -= dt;
    let blocked = false;
    if(cell.queue.length && cell.t <= 0){
      const d = DIRS[cell.dir], lat = [-d[1], d[0]];
      const outs = cell.type==='splitter'
        ? [[d,cell.dir],[lat,(cell.dir+1)%4],[[-lat[0],-lat[1]],(cell.dir+3)%4]]
        : [[d,cell.dir]];
      let sent = false;
      for(let k=0;k<outs.length;k++){
        const pick = (cell.rr + k) % outs.length;
        const [ov, od] = outs[pick];
        const oi = cell.i+ov[0], oj = cell.j+ov[1];
        const c2 = cells.get(keyOf(oi,oj));
        if(c2 && c2.type==='belt' && !c2.ramp && c2.dir===od && ridersOn(oi,oj) < 2){
          const item = cell.queue.shift();
          const cc = tileCenter(cell.i, cell.j);
          const r2 = addRider(item.mesh, cc.x + ov[0]*0.3, 1.0 + item.half, cc.z + ov[1]*0.3);
          r2.ax = ov[0]; r2.az = ov[1];
          cell.rr = (pick+1) % outs.length;
          cell.t = 0.22;
          sent = true;
          break;
        }
      }
      if(!sent) blocked = true;
    }
    const full = cell.queue.length >= HUB_Q;
    cell.lamp.material.emissive.setHex((blocked||full) ? 0x8a2018 : 0xb06a20);
    cell._blk = blocked;
    cell.lamp.material.emissiveIntensity = (blocked||full) ? 0.7 : (cell.queue.length ? 0.5 : 0.22);
    if(blocked){ cell.blockT -= dt; if(cell.blockT<=0){ toast((cell.type==='splitter'?'SPLITTER':'MERGER')+' OUTPUT BLOCKED'); cell.blockT = 6; } }
    else cell.blockT = 0;
  }
}

function updateAssemblers(dt){
  for(const cell of cells.values()){
    if(cell.type!=='assembler' || cell.part!==0) continue;
    const core = cell.core;
    if(core.t <= 0 && core.inA > 0 && core.inB > 0 && core.buffer < ASM_BUF){
      core.inA--; core.inB--; core.t = ASM_TIME;
    }
    if(core.t > 0){
      core.t -= dt;
      if(core.t <= 0) core.buffer++;
    }
    let aBlocked = false;
    if(core.buffer > 0){
      const d = DIRS[core.dir];
      const oi = core.origin[0]+2*d[0], oj = core.origin[1]+2*d[1];
      const out = cells.get(keyOf(oi,oj));
      aBlocked = !(out && out.type==='belt' && !out.ramp && ridersOn(oi,oj) < 2);
      if(!aBlocked){
        core.buffer--;
        _s = 55+core.origin[0];
        const pr = mkProduct();
        const c1 = tileCenter(core.origin[0]+d[0], core.origin[1]+d[1]);
        const r2 = addRider(pr, c1.x + d[0]*0.3, 1.0 + pr.userData.half, c1.z + d[1]*0.3);
        r2.ax = d[0]; r2.az = d[1];

    core.glowMat.emissive.setHex(aBlocked ? 0x8a2018 : 0xb05a1c);
    core.lamp.material.emissive.setHex(aBlocked ? 0x8a2018 : 0xb06a20);
    if(aBlocked){ core.blockT = (core.blockT||0) - dt; if(core.blockT<=0){ toast('ASSEMBLER OUTPUT BLOCKED'); core.blockT = 6; } }
    else core.blockT = 0;
    const active = core.t > 0;
    core.heat = lerp(core.heat, active ? 1 : 0.08, Math.min(1, 3*dt));
    const flick = 1 + Math.sin(phase*10 + core.origin[0])*0.15;
    core.glowMat.emissiveIntensity = 0.12 + core.heat*0.8*flick;
    core.lamp.material.emissiveIntensity = 0.2 + core.heat*0.5*flick;
    core.piston.position.y = 1.6 - (active ? (0.5+0.5*Math.sin(phase*9))*0.42*core.heat : 0);
  }
}

function sorterSetSlot(core, slot, kindIdx){
  core.slots[slot] = kindIdx;
  const mount = core.displayMounts[slot];
  while(mount.children.length) mount.remove(mount.children[0]);
  if(kindIdx < 0){
    const blank = box(0.3,0.3,0.05,M.dark); blank.rotation.x = -0.25; mount.add(blank);
  } else {
    _s = 100+slot*7;
    const it = ITEM_KINDS[kindIdx].mk();
    it.scale.setScalar(0.72);
    it.position.y = 0.08;
    mount.add(it);
  }
}
function placeSorter(i,j,dir){
  const d = DIRS[dir];
  const tiles = [[i,j],[i+d[0],j+d[1]],[i+2*d[0],j+2*d[1]]];
  for(const [ti,tj] of tiles){
    if(!inBounds(ti,tj) || cells.has(keyOf(ti,tj)) || cells2.has(keyOf(ti,tj))) return false;
  }
  _s = 810+i*11+j*3;

  b.group.rotation.y = DIR_RY[dir];
  const core = {origin:[i,j], dir, group:b.group, displayMounts:b.displayMounts, lamp:b.lamp,
    slots:[0,1,2,3,4,5], queue:[], t:0};
  for(let s=0;s<6;s++) sorterSetSlot(core, s, s); // all 6 kinds pre-assigned
  b.group.traverse(o=>{ o.userData.tileKey = keyOf(i,j); if(o.userData.sorterSlot!==undefined) o.userData.sorterCore = core; });
  scene.add(b.group); snapIn(b.group);
  tiles.forEach(([ti,tj],k)=>{
    cells.set(keyOf(ti,tj), {type:'sorter', i:ti, j:tj, part:k, core, dir});

function removeSorter(core){

function sorterAccepts(cell, dirIdx){
  const cd = cell.core.dir;
  if(cell.core.queue.length >= SORTER_Q) return false;
  if(cell.part===0 && dirIdx===cd) return true;          // in through the back end
  if(cell.part===2 && dirIdx===(cd+2)%4) return true;    // in through the front end
  return false;
}
function sorterIntake(cell, r, idx){
  scene.remove(r.mesh);
  riders.splice(idx,1);
  cell.core.queue.push({kind:r.mesh.userData.kind || 'ore', mesh:r.mesh, half:r.half});
  updateCounter();
}
function sorterEject(core, item, pi, pj, vx, vz){
  const c = tileCenter(pi,pj);
  const r2 = addRider(item.mesh, c.x + vx*0.32, 1.0 + item.half, c.z + vz*0.32);
  r2.ax = vx; r2.az = vz;
}
function updateSorters(dt){
  for(const cell of cells.values()){
    if(cell.type!=='sorter' || cell.part!==0) continue;
    const core = cell.core;
    core.t -= dt;
    // spin the filter displays; lamp heat
    for(const m of core.displayMounts) if(m.children[0] && core.slots[core.displayMounts.indexOf(m)]>=0) m.children[0].rotation.y += dt*0.9;
    core.lamp.material.emissiveIntensity = 0.22 + (core.queue.length>0 ? 0.35+Math.sin(phase*8)*0.1 : 0);
    if(core.t > 0 || !core.queue.length) continue;
    const d = DIRS[core.dir], lat = [-d[1], d[0]];
    const [oi,oj] = core.origin;
    for(let q=0;q<core.queue.length;q++){
      const item = core.queue[q];
      const kIdx = ITEM_KINDS.findIndex(K=>K.k===item.kind);
      const slot = core.slots.indexOf(kIdx);
      let out = null;
      if(slot >= 0){
        const part = slot%3, s = slot<3 ? 1 : -1;
        const ti = oi + part*d[0] + s*lat[0], tj = oj + part*d[1] + s*lat[1];
        const c = cells.get(keyOf(ti,tj));
        if(c && c.type==='belt' && !c.ramp && ridersOn(ti,tj)<2)
          out = [oi + part*d[0], oj + part*d[1], s*lat[0], s*lat[1]]; // spawn on the part, ride out the aperture
      } else {
        // unassigned kind: overflow out an end onto an outward-flowing belt
        for(const [pi2,pj2,ei,ej,wx,wz] of [
          [oi+2*d[0], oj+2*d[1], oi+3*d[0], oj+3*d[1], d[0], d[1]],
          [oi, oj, oi-d[0], oj-d[1], -d[0], -d[1]]
        ]){
          const c = cells.get(keyOf(ei,ej));
          if(c && c.type==='belt' && !c.ramp &&
             DIRS[c.dir][0]===wx && DIRS[c.dir][1]===wz && ridersOn(ei,ej)<2){ out=[pi2,pj2,wx,wz]; break; }
        }
      }
      if(out){
        core.queue.splice(q,1);
        sorterEject(core, item, out[0], out[1], out[2], out[3]);
        core.t = 0.3;
        break;
      }
    }
  }
}

function updateSmelters(dt){
  for(const cell of cells.values()){
    if(cell.type!=='smelter') continue;
    if(cell.t <= 0 && cell.queue > 0){ cell.queue--; cell.t = cell.smeltT || 1.15; }
    if(cell.t > 0){
      cell.t -= dt;
      if(cell.t <= 0) cell.buffer = Math.min(cell.buffer+1, 4);
    }
    let outBlocked = false;
    if(cell.buffer > 0){
      const d = DIRS[cell.dir];
      const oi = cell.i+d[0], oj = cell.j+d[1];
      const out = cells.get(keyOf(oi,oj));
      outBlocked = !(out && out.type==='belt' && ridersOn(oi,oj) < 2);
      if(!outBlocked){
        cell.buffer--;
        _s = 77 + cell.i*3 + cell.j;
        const ing = mkIngot();
        const c = tileCenter(cell.i, cell.j);
        const r2 = addRider(ing, c.x + d[0]*0.3, 1.0 + ing.userData.half, c.z + d[1]*0.3);
        r2.ax = d[0]; r2.az = d[1];
      }
    }
    cell.glowMat.emissive.setHex(outBlocked ? 0x8a2018 : 0xb05a1c);
    cell._blk = outBlocked;
    if(outBlocked){ cell.blockT = (cell.blockT||0) - dt; if(cell.blockT<=0){ toast('SMELTER OUTPUT BLOCKED'); cell.blockT = 6; } }
    else cell.blockT = 0;
    // glow + smoke
    const active = cell.t > 0 || cell.queue > 0;
    cell.heat = lerp(cell.heat, active ? 1 : 0.06, Math.min(1, 3*dt));
    const flick = 1 + Math.sin(phase*11 + cell.i)*0.16;
    cell.glowMat.emissiveIntensity = 0.16 + cell.heat*1.0*flick;
    cell.light.intensity = 0.12 + cell.heat*0.85*flick;
    cell.smokeT += dt*(0.1 + cell.heat*0.75);
    cell.smoke.forEach((p,k)=>{
      const f = mod(cell.smokeT + k/3, 1);
      p.position.y = 3.98 + f*1.1;
      p.position.x = 0.44 + Math.sin((f*3+k)*2.1)*0.07;
      const s = 0.6 + f*1.1;
      p.scale.setScalar(s);
      p.material.opacity = (1-f) * 0.6 * cell.heat;
    });
  }
}

function solveIKAt(base, A, B, SH, target){
  const lx = target.x - base.x;
  const lz = target.z - base.z;
  const yaw = Math.atan2(lx, lz);
  const rp = Math.sqrt(lx*lx + lz*lz);
  const yy = target.y - SH;
  let d = Math.sqrt(rp*rp + yy*yy);
  d = clamp(d, Math.abs(A-B)+0.05, A+B-0.05);
  const ph = Math.atan2(rp, yy);
  const c1 = Math.acos(clamp((A*A + d*d - B*B)/(2*A*d), -1, 1));
  const c2 = Math.acos(clamp((B*B + d*d - A*A)/(2*B*d), -1, 1));
  const t1 = ph - c1, t2 = ph + c2;
  return { yaw, s:t1, e:t2-t1, w:Math.PI - t2 };
}
function lerpAngle(a,b,t){
  let d = b-a;
  while(d > Math.PI) d -= Math.PI*2;
  while(d < -Math.PI) d += Math.PI*2;
  return a + d*t;
}

/* generic sequenced arm controller */
function mkArmCtl(rig, basePos){
  return {rig, basePos,
    joints:{yaw:Math.PI*0.8, s:0.35, e:0.9, w:Math.PI-1.25, open:1},
    seq:null, seqI:0, phaseT:0, phaseFrom:null, held:null};
}
function armPose(ctl, point){
  const ik = solveIKAt(ctl.basePos, ctl.rig.A, ctl.rig.B, ctl.rig.SH, point);
  return {yaw:ik.yaw, s:ik.s, e:ik.e, w:ik.w};
}
function armStartSeq(ctl, seq){
  ctl.seq = seq; ctl.seqI = 0; ctl.phaseT = 0;
  const j = ctl.joints;
  ctl.phaseFrom = {yaw:j.yaw, s:j.s, e:j.e, w:j.w, open:j.open};
}
function armApply(ctl){
  const r = ctl.rig, j = ctl.joints;
  r.yawG.rotation.y = j.yaw;
  r.shG.rotation.x = j.s;
  r.elG.rotation.x = j.e;
  r.wrG.rotation.x = j.w;
  for(const f of r.fingers) f.g.rotation.z = f.s*lerp(0.12, 0.6, j.open);
}
function armUpdate(ctl, dt){
  if(!ctl.seq){ armApply(ctl); return false; }
  const ph = ctl.seq[ctl.seqI];
  ctl.phaseT += dt/ph.t;
  const k = ease(ctl.phaseT);
  const j = ctl.joints, f0 = ctl.phaseFrom;
  j.yaw = lerpAngle(f0.yaw, ph.p.yaw, k);
  j.s = lerp(f0.s, ph.p.s, k);
  j.e = lerp(f0.e, ph.p.e, k);
  j.w = lerp(f0.w, ph.p.w, k);
  j.open = lerp(f0.open, ph.open, k);
  armApply(ctl);
  if(ctl.phaseT >= 1){
    if(ph.onEnd) ph.onEnd();
    ctl.seqI++; ctl.phaseT = 0;
    ctl.phaseFrom = {yaw:j.yaw, s:j.s, e:j.e, w:j.w, open:j.open};
    if(ctl.seqI >= ctl.seq.length) ctl.seq = null;
  }
  return true;
}

const REACH = 3.1;

function findDropTile(){
  let best = null, bd = 1e9;
  for(const rec of cells.values()){
    if(rec.type!=='belt') continue;
    const c = tileCenter(rec.i, rec.j);
    const dx = c.x-ARM_POS.x, dz = c.z-ARM_POS.z;
    const d = Math.sqrt(dx*dx+dz*dz);
    if(d < bd && d <= REACH){ bd = d; best = rec; }
  }
  return best;
}
function startFeedJob(ci){
  const drop = findDropTile();
  if(!drop){ toast('NO BELT WITHIN ARM REACH — BUILD ONE CLOSER'); return; }
  if(ridersOn(drop.i, drop.j) >= 2){ jobQueue.unshift(ci); return; } // belt full: wait
  const c = containers[ci];
  const grab = c.grabPoint;
  const dc = tileCenter(drop.i, drop.j);
  const dy = drop.pc.topY + 0.32;
  const T2 = bigRig.TIP;
  const wristGrab   = new THREE.Vector3(grab.x, grab.y + T2, grab.z);
  const wristHover  = new THREE.Vector3(grab.x, grab.y + T2 + 0.9, grab.z);
  const wristDrop   = new THREE.Vector3(dc.x, dy + T2 + 0.1, dc.z);
  const wristDropHi = new THREE.Vector3(dc.x, dy + T2 + 1.0, dc.z);
  armStartSeq(bigArm, [
    {p:armPose(bigArm,wristHover),  open:1, t:0.6},
    {p:armPose(bigArm,wristGrab),   open:1, t:0.34},
    {p:armPose(bigArm,wristGrab),   open:0, t:0.2, onEnd:()=>{
      const item = containers[ci].makeItem();
      item.traverse(o=>{ if(o.isMesh) o.castShadow = true; });
      bigRig.socket.add(item);
      item.position.set(0,0,0);
      bigArm.held = item;
    }},
    {p:armPose(bigArm,wristHover),  open:0, t:0.32},
    {p:armPose(bigArm,wristDropHi), open:0, t:0.62},
    {p:armPose(bigArm,wristDrop),   open:0, t:0.34},
    {p:armPose(bigArm,wristDrop),   open:1, t:0.18, onEnd:()=>{
      if(!bigArm.held) return;
      const wp = new THREE.Vector3();
      bigRig.socket.getWorldPosition(wp);
      bigRig.socket.remove(bigArm.held);
      const d2 = findDropTile();
      if(d2 && ridersOn(d2.i, d2.j) < 2){
        spawnRiderAt(bigArm.held, d2.i, d2.j);
      } else {
        const r = addRider(bigArm.held, wp.x, wp.y, wp.z);
        r.falling = true; r.ax = 0; r.az = 0;
      }
      bigArm.held = null;
    }},
    {p:armPose(bigArm,wristDropHi), open:1, t:0.3}
  ]);
}

function startTransfer(cell, grabP, dropP, onGrab, onRelease){
  const ctl = cell.ctl, T2 = cell.rig.TIP, f = cell.speedF || 1;
  const wristGrab  = new THREE.Vector3(grabP.x, grabP.y + T2, grabP.z);
  const wristHover = new THREE.Vector3(grabP.x, grabP.y + T2 + 0.55, grabP.z);
  const wristDrop  = new THREE.Vector3(dropP.x, dropP.y + T2 + 0.08, dropP.z);
  const wristDropHi= new THREE.Vector3(dropP.x, dropP.y + T2 + 0.55, dropP.z);
  armStartSeq(ctl, [
    {p:armPose(ctl,wristHover),  open:1, t:0.24/f},
    {p:armPose(ctl,wristGrab),   open:1, t:0.18/f},
    {p:armPose(ctl,wristGrab),   open:0, t:0.13/f, onEnd:onGrab},
    {p:armPose(ctl,wristHover),  open:0, t:0.16/f},
    {p:armPose(ctl,wristDropHi), open:0, t:0.36/f},
    {p:armPose(ctl,wristDrop),   open:0, t:0.16/f},
    {p:armPose(ctl,wristDrop),   open:1, t:0.1/f, onEnd:onRelease},
    {p:armPose(ctl,wristDropHi), open:1, t:0.2/f}
  ]);
}
function updateSmallArms(dt){
  for(const cell of cells.values()){
    if(cell.type!=='arm') continue;
    if(armUpdate(cell.ctl, dt)) continue;
    cell.coolT -= dt;
    if(cell.coolT > 0) continue;
    const ctl = cell.ctl;
    const d = DIRS[cell.dir];
    const inI = cell.i-d[0], inJ = cell.j-d[1];
    const outI = cell.i+d[0], outJ = cell.j+d[1];
    const outCell = cells.get(keyOf(outI,outJ));
    const oc = tileCenter(outI,outJ);
    let dropP = null, onRelease = null;
    if(outCell && outCell.type==='belt' && ridersOn(outI,outJ) < 2){
      dropP = new THREE.Vector3(oc.x, outCell.pc.topY + 0.28, oc.z);
      onRelease = ()=>{
        if(!ctl.held) return;
        const {mesh, half} = ctl.held;
        cell.rig.socket.remove(mesh);
        addRider(mesh, dropP.x, dropP.y + half, dropP.z);
        ctl.held = null;
      };
    } else if(outCell && outCell.type==='storage' && outCell.core.count < outCell.core.cap){
      dropP = new THREE.Vector3(oc.x, 1.56, oc.z);
      onRelease = ()=>{
        if(!ctl.held) return;
        const {mesh, half} = ctl.held;
        cell.rig.socket.remove(mesh);
        depositMesh(outCell.core, mesh);
        ctl.held = null;
      };
    }
    if(!dropP) continue;
    const inCell = cells.get(keyOf(inI,inJ));
    const bp = ctl.basePos;
    if(inCell && inCell.type==='belt'){
      let target = null;
      for(const r of riders){
        if(r.claimed || r.falling || r.layer!==0) continue;
        const [ti,tj] = tileAt(r.mesh.position.x, r.mesh.position.z);
        if(ti!==inI || tj!==inJ) continue;
        const dx = r.mesh.position.x-bp.x, dz = r.mesh.position.z-bp.z;
        if(Math.sqrt(dx*dx+dz*dz) > 2.25) continue;
        target = r; break;
      }
      if(!target) continue;
      target.claimed = true;
      const gp = target.mesh.position.clone();
      startTransfer(cell, gp, dropP, ()=>{
        const idx = riders.indexOf(target);
        if(idx>=0) riders.splice(idx,1);
        scene.remove(target.mesh);
        cell.rig.socket.add(target.mesh);
        target.mesh.position.set(0,0,0);
        target.mesh.rotation.set(0,0,0);
        ctl.held = {mesh:target.mesh, half:target.half};
        updateCounter();
      }, onRelease);
      cell.coolT = 0.25/(cell.speedF||1);
    } else if(inCell && inCell.type==='storage' && inCell.core.count > 0){
      const ic = tileCenter(inI,inJ);
      const gp = new THREE.Vector3(ic.x, 1.58, ic.z);
      startTransfer(cell, gp, dropP, ()=>{
        const mesh = withdrawMesh(inCell.core);
        cell.rig.socket.add(mesh);
        mesh.position.set(0,0,0);
        mesh.rotation.set(0,0,0);
        ctl.held = {mesh, half:mesh.userData.half||0.2};
      }, onRelease);
      cell.coolT = 0.5/(cell.speedF||1);
    } else if(inCell && inCell.type==='prop' && inCell.container){
      const cont = inCell.container;
      startTransfer(cell, cont.grabPoint, dropP, ()=>{
        const it = cont.makeItem();
        it.traverse(o=>{ if(o.isMesh) o.castShadow = true; });
        it.traverse(o=>{ if(o.material){ o.material=o.material.clone(); o.material.transparent=true; } });
        cell.rig.socket.add(it);
        it.position.set(0,0,0);
        ctl.held = {mesh:it, half:it.userData.half||0.2};
      }, onRelease);
      cell.coolT = 0.9/(cell.speedF||1);
    }
  }
}

const mlPool = new Map();
const _mlv = new THREE.Vector3();
function updateMachineLabels(){
  const wrap = document.getElementById('mlabels');
  if(!wrap) return;
  const seen = new Set();
  const W = innerWidth, H = innerHeight;
  for(const cell of cells.values()){
    let txt = null, bad = false, wx, wz, wy;
    if(cell.type==='smelter'){
      wx = cell.i*2; wz = cell.j*2; wy = 4.0;
      if(cell._blk){ txt = 'OUTPUT BLOCKED'; bad = true; }
      else if(cell.t > 0) txt = 'SMELTING…' + (cell.buffer ? ' · OUT '+cell.buffer : '');
      else txt = 'IN ' + cell.queue + '/' + SMELT_Q + (cell.buffer ? ' · OUT '+cell.buffer : '');
    } else if(cell.type==='storage' && cell.part===0){
      const core = cell.core, d = DIRS[core.dir];
      wx = (cell.i + d[0]*0.5)*2; wz = (cell.j + d[1]*0.5)*2; wy = 2.15;
      txt = core.count + '/' + core.cap;
      bad = core.count >= core.cap;
    } else if(cell.type==='splitter' || cell.type==='merger'){
      if(!cell._blk && cell.queue.length===0) continue; // quiet when flowing freely
      wx = cell.i*2; wz = cell.j*2; wy = 2.4;
      txt = cell._blk ? 'BLOCKED' : cell.queue.length + '/' + HUB_Q;
      bad = !!cell._blk;
    } else if(cell.type==='assembler' && cell.part===0){
      const core = cell.core, d = DIRS[core.dir];
      wx = (cell.i + d[0])*2; wz = (cell.j + d[1])*2; wy = 2.4;
      if(core._blk){ txt = 'OUTPUT BLOCKED'; bad = true; }
      else txt = 'A ' + core.inA + '/' + ASM_BUF + ' · B ' + core.inB + '/' + ASM_BUF + (core.t>0 ? ' · PRESSING…' : '');
    } else if(cell.type==='sorter' && cell.part===0){
      const core = cell.core, d = DIRS[core.dir];
      wx = (cell.i + d[0])*2; wz = (cell.j + d[1])*2; wy = 2.5;
      txt = 'QUEUE ' + core.queue.length + '/' + SORTER_Q;
      bad = core.queue.length >= SORTER_Q;
    }
    if(txt===null) continue;
    const key = cell.type + ':' + cell.i + ',' + cell.j;
    seen.add(key);
    let el = mlPool.get(key);
    if(!el){
      el = document.createElement('div');
      el.className = 'ml';
      wrap.appendChild(el);
      mlPool.set(key, el);
    }
    _mlv.set(wx, wy, wz).project(camera);
    const dx = camera.position.x - wx, dz = camera.position.z - wz;
    const far = (dx*dx + dz*dz) > 24*24;
    if(el._t !== txt){ el.textContent = txt; el._t = txt; }
    el.classList.toggle('bad', bad);
    if(_mlv.z > 1 || far || _mlv.x < -1.05 || _mlv.x > 1.05 || _mlv.y < -1.05 || _mlv.y > 1.05){
      el.style.display = 'none';
    } else {
      el.style.display = 'block';
      el.style.left = (((_mlv.x*0.5+0.5)*W)|0)+'px';
      el.style.top = (((-_mlv.y*0.5+0.5)*H)|0)+'px';
    }
  }
  for(const [k,el] of mlPool) if(!seen.has(k)){ el.remove(); mlPool.delete(k); }
}

function portsOf(cell){
  const res = [];
  const T = cell.type;
  if(T==='belt' || T==='prop') return res;
  if((T==='sorter' || T==='assembler' || T==='storage') && cell.part!==0) return res;
  const d = DIRS[cell.dir], lat = [-d[1], d[0]];
  const i = cell.i, j = cell.j;
  if(T==='smelter'){
    res.push({ext:[i-d[0], j-d[1]], entry:cell.dir, inb:true,  label:'SMELTER INPUT'});
    res.push({ext:[i+d[0], j+d[1]], entry:cell.dir, inb:false, label:'SMELTER OUTPUT'});
  } else if(T==='storage'){
    const o = cell.core.origin;
    res.push({ext:[o[0]-d[0], o[1]-d[1]], entry:cell.core.dir, inb:true, label:'STORAGE INPUT'});
    res.push({ext:[o[0]+2*d[0], o[1]+2*d[1]], entry:cell.core.dir, inb:false, label:'STORAGE OUTPUT'});
  } else if(T==='arm'){
    res.push({ext:[i-d[0], j-d[1]], entry:null, inb:true,  label:'ARM PICKUP SIDE'});
    res.push({ext:[i+d[0], j+d[1]], entry:null, inb:false, label:'ARM DROP SIDE'});
  } else if(T==='splitter'){
    res.push({ext:[i-d[0], j-d[1]], entry:cell.dir, inb:true, label:'SPLITTER INPUT'});
    res.push({ext:[i+d[0], j+d[1]], entry:cell.dir, inb:false, label:'SPLITTER OUTPUT'});
    res.push({ext:[i+lat[0], j+lat[1]], entry:dirIndexOf(lat[0],lat[1]), inb:false, label:'SPLITTER OUTPUT'});
    res.push({ext:[i-lat[0], j-lat[1]], entry:dirIndexOf(-lat[0],-lat[1]), inb:false, label:'SPLITTER OUTPUT'});
  } else if(T==='merger'){
    res.push({ext:[i-d[0], j-d[1]], entry:cell.dir, inb:true, label:'MERGER INPUT'});
    res.push({ext:[i+lat[0], j+lat[1]], entry:dirIndexOf(-lat[0],-lat[1]), inb:true, label:'MERGER INPUT'});
    res.push({ext:[i-lat[0], j-lat[1]], entry:dirIndexOf(lat[0],lat[1]), inb:true, label:'MERGER INPUT'});
    res.push({ext:[i+d[0], j+d[1]], entry:cell.dir, inb:false, label:'MERGER OUTPUT'});
  } else if(T==='assembler'){
    const o = cell.core.origin;
    res.push({ext:[o[0]+lat[0], o[1]+lat[1]], entry:dirIndexOf(-lat[0],-lat[1]), inb:true, label:'ASSEMBLER INPUT A'});
    res.push({ext:[o[0]-lat[0], o[1]-lat[1]], entry:dirIndexOf(lat[0],lat[1]), inb:true, label:'ASSEMBLER INPUT B'});
    res.push({ext:[o[0]+2*d[0], o[1]+2*d[1]], entry:cell.core.dir, inb:false, label:'PRODUCT OUTPUT'});
  } else if(T==='sorter'){
    const o = cell.core.origin;
    res.push({ext:[o[0]-d[0], o[1]-d[1]], entry:cell.core.dir, inb:true, label:'SORTER INPUT'});
    res.push({ext:[o[0]+3*d[0], o[1]+3*d[1]], entry:(cell.core.dir+2)%4, inb:true, label:'SORTER INPUT'});

      res.push({ext:[o[0]+p*d[0]+s*lat[0], o[1]+p*d[1]+s*lat[1]],
                entry:dirIndexOf(s*lat[0], s*lat[1]), inb:false, label:'SORTER OUTPUT'});
    }
  }
  return res;
}

/* placement snapping: machine ghosts auto-orient to nearby belts */
let snapKey = '', snapLock = false;
function snapDirFor(ti, tj){
  // feeders first: a belt pointing into this tile becomes the input
  for(let w=0; w<4; w++){
    const n = cells.get(keyOf(ti+DIRS[w][0], tj+DIRS[w][1]));
    if(n && n.type==='belt' && !n.ramp && n.dir===(w+2)%4){
      const md = (w+2)%4; // item flow direction into the tile
      if(activeTool==='assembler') return (md+1)%4; // side port faces the feeder
      return md; // smelter/storage/sorter/hubs/arm: input lines up with the flow
    }
  }
  // otherwise: a belt flowing away becomes the output (single-tile outputs only)
  for(let w=0; w<4; w++){
    const n = cells.get(keyOf(ti+DIRS[w][0], tj+DIRS[w][1]));
    if(n && n.type==='belt' && !n.ramp && n.dir===w){
      if(activeTool==='smelter' || activeTool==='arm' || activeTool==='splitter' || activeTool==='merger') return w;
    }
  }
  return null;
}
function applyGhostSnap(t){
  if(!t || activeTool==='belt') { snapKey=''; return; }
  const key = t[0]+','+t[1];
  if(key === snapKey) return;
  snapKey = key;
  snapLock = false;
  const s = snapDirFor(t[0], t[1]);
  if(s !== null && !snapLock) ghostDir = s;
}
